<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוליבי ספורט - עגלת קניות</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="header-style.css">
    
    <style>
        :root {
            --brand-green: #7ca856;
            --bg-silver-matte: linear-gradient(145deg, #f5f5f5 0%, #e0e0e0 100%);
            --element-navy-gradient: linear-gradient(145deg, #0a2e57 0%, #062141 100%);
            --text-dark: #062141;
            --text-gray: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Rubik', sans-serif; background: var(--bg-silver-matte); width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; overflow: hidden; }
        
        .premium-title-wrapper { margin-bottom: 25px; flex-shrink: 0; }
        .page-title { background: #ffffff; padding: 10px 50px; border-radius: 40px; font-size: 28px; font-weight: 900; color: var(--text-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* חלון העגלה */
        .cart-window {
            width: 95%; max-width: 1000px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            display: flex; flex-direction: row; overflow: hidden; flex: 1;
        }

        /* רשימת המוצרים (צד ימין) */
        .cart-items-side { flex: 2; padding: 30px; overflow-y: auto; direction: ltr; }
        .cart-items-inner { direction: rtl; }

        .cart-item {
            display: flex; align-items: center; background: #fff; padding: 15px; border-radius: 15px;
            margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s;
        }
        .cart-item:hover { transform: translateX(-5px); border-color: var(--brand-green); }
        .item-img { width: 70px; height: 70px; background: #f8f9fa; border-radius: 10px; margin-left: 20px; display: flex; align-items: center; justify-content: center; }
        .item-info { flex: 1; }
        .item-title { font-weight: 900; color: var(--text-dark); font-size: 16px; }
        .item-price { color: var(--brand-green); font-weight: 700; }
        
        .quantity-controls { display: flex; align-items: center; gap: 12px; margin: 0 20px; }
        .q-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .q-btn:hover { background: var(--brand-green); color: #fff; border-color: var(--brand-green); }
        
        .remove-item { color: #ff3b30; cursor: pointer; font-size: 18px; margin-right: 15px; opacity: 0.6; transition: 0.3s; }
        .remove-item:hover { opacity: 1; transform: scale(1.2); }

        /* סיכום הזמנה (צד שמאל) */
        .cart-summary-side { flex: 1; background: var(--element-navy-gradient); padding: 35px; color: #fff; display: flex; flex-direction: column; }
        .summary-title { font-size: 22px; font-weight: 900; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; }
        .total-row { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; font-size: 20px; font-weight: 900; }
        
        .checkout-btn {
            background: var(--brand-green); color: #fff; border: none; padding: 18px; border-radius: 12px;
            font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 25px; transition: 0.3s; width: 100%;
        }
        .checkout-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(124, 168, 86, 0.3); }

        .empty-cart-msg { text-align: center; padding: 50px; display: none; }

        /* --- טיקר תחתון (מתוקן) --- */
        .footer { 
            background: var(--element-navy-gradient); border-top: 2px solid var(--brand-green); 
            width: 100%; height: 45px; flex-shrink: 0; 
            display: flex; align-items: center; overflow: hidden;
        }
        #ticker-placeholder { width: 100%; display: flex; align-items: center; }
        
        .ticker-wrap { display: inline-flex; white-space: nowrap; animation: ticker 30s linear infinite; direction: ltr !important; }
        .ticker-item { color: #ffffff !important; font-weight: 700; font-size: 14px; display: inline-block; margin: 0 15px; vertical-align: middle; direction: rtl !important; }
        .ticker-separator { color: var(--brand-green); font-weight: 900; margin: 0 15px; font-size: 15px; display: inline-block; vertical-align: middle; transform: translateY(-1px); }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100vw); } }

        @media (max-width: 800px) {
            .cart-window { flex-direction: column; overflow-y: auto; }
            .cart-summary-side { flex: none; }
            html, body { overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="premium-title-wrapper">
            <h1 class="page-title">סל <span style="color: var(--brand-green);">הקניות</span> שלי</h1>
        </div>

        <div class="cart-window">
            <div class="cart-items-side">
                <div class="cart-items-inner" id="cart-items-list">
                    </div>
                <div id="empty-msg" class="empty-cart-msg">
                    <h2 style="color: var(--text-gray);">העגלה שלך ריקה...</h2>
                    <p style="margin-top:15px;"><a href="store.html" style="color: var(--brand-green); font-weight: 700;">חזור לחנות לרכישות</a></p>
                </div>
            </div>

            <div class="cart-summary-side">
                <h2 class="summary-title">סיכום הזמנה</h2>
                <div class="summary-row"><span>פריטים:</span> <span id="items-count">0</span></div>
                <div class="summary-row"><span>משלוח:</span> <span>חינם!</span></div>
                <div class="total-row"><span>סה"כ:</span> <span id="total-price">0 ₪</span></div>
                <button class="checkout-btn" onclick="goToCheckout()">המשך לתשלום</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div id="ticker-placeholder"></div>
    </footer>

    <script>
        fetch('header.html').then(res => res.text()).then(data => document.getElementById('header-placeholder').innerHTML = data);
        fetch('ticker.html').then(res => res.text()).then(data => document.getElementById('ticker-placeholder').innerHTML = data);

        // פונקציה להצגת המוצרים מהזיכרון
        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const count = parseInt(localStorage.getItem('solibiCartCount')) || 0;

            if (count === 0) {
                document.getElementById('empty-msg').style.display = 'block';
                return;
            }

            list.innerHTML = '';
            for(let i=0; i<count; i++) {
                list.innerHTML += `
                    <div class="cart-item">
                        <div class="item-img">📦</div>
                        <div class="item-info">
                            <div class="item-title">מוצר סוליבי פרימיום</div>
                            <div class="item-price">99 ₪</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="q-btn" onclick="updateItemQuantity(this, -1)">-</button>
                            <span>1</span>
                            <button class="q-btn" onclick="updateItemQuantity(this, 1)">+</button>
                        </div>
                        <div class="remove-item" onclick="removeFromCart()">✕</div>
                    </div>
                `;
            }
            updateSummary(count);
        }

        function updateSummary(count) {
            document.getElementById('items-count').innerText = count;
            document.getElementById('total-price').innerText = (count * 99) + ' ₪';
        }

        // פונקציה ראשונית לעדכון כמות פריט בודד
        function updateItemQuantity(btn, change) {
             const quantitySpan = btn.parentElement.querySelector('span');
             let currentQuantity = parseInt(quantitySpan.innerText);
             let newQuantity = currentQuantity + change;
             
             if (newQuantity > 0) {
                 quantitySpan.innerText = newQuantity;
                 // TODO: כאן צריך להוסיף לוגיקה לעדכון הכמות ב-localStorage והמחיר הכולל
             } else if (newQuantity === 0) {
                 // אם הכמות יורדת ל-0, נסיר את המוצר מהעגלה
                 removeFromCart();
             }
        }

        function removeFromCart() {
            let count = parseInt(localStorage.getItem('solibiCartCount')) || 0;
            if (count > 0) {
                localStorage.setItem('solibiCartCount', count - 1);
                renderCart();
            }
        }

        function goToCheckout() {
            alert('מעבר לעמוד תשלום מאובטח...');
        }

        window.onload = renderCart;
    </script>

    <script src="search.js"></script>
</body>
</html>
