<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוליבי ספורט - עגלת קניות</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="header-style.css">
    
    <style>
        :root {
            --brand-green: #7ca856;
            --bg-silver-matte: linear-gradient(145deg, #f5f5f5 0%, #e0e0e0 100%);
            --element-navy-gradient: linear-gradient(145deg, #0a2e57 0%, #062141 100%);
            --text-dark: #062141;
            --text-gray: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Rubik', sans-serif; background: var(--bg-silver-matte); width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; overflow: hidden; }
        
        /* חלון העגלה */
        .cart-window {
            width: 95%; max-width: 1000px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            display: flex; flex-direction: row; overflow: hidden; flex: 1;
        }

        /* רשימת המוצרים (צד ימין) */
        .cart-items-side { flex: 2; padding: 30px; overflow-y: auto; direction: ltr; }
        .cart-items-inner { direction: rtl; }

        .cart-item {
            display: flex; align-items: center; background: #fff; padding: 15px; border-radius: 15px;
            margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s;
        }
        .cart-item:hover { transform: translateX(-5px); border-color: var(--brand-green); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .item-img { width: 70px; height: 70px; background: #f8f9fa; border-radius: 10px; margin-left: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .item-img img { width: 100%; height: 100%; object-fit: cover; }
        .item-img svg { width: 40px; height: 40px; color: var(--text-gray); opacity: 0.3; }
        
        .item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-title { font-weight: 900; color: var(--text-dark); font-size: 16px; margin-bottom: 5px; }
        .item-price { color: var(--brand-green); font-weight: 700; }
        
        /* כפתורי כמות מעוצבים */
        .quantity-controls { display: flex; align-items: center; gap: 12px; margin: 0 20px; background: #f5f5f5; padding: 5px; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05); }
        .q-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: #fff; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; color: var(--text-dark); }
        .q-btn:hover { background: var(--text-dark); color: #fff; }
        .q-num { font-weight: 700; width: 20px; text-align: center; color: var(--text-dark); }
        
        /* כפתור מחיקה */
        .remove-item { color: #ffb3b0; cursor: pointer; font-size: 18px; margin-right: 15px; transition: 0.3s; font-weight: bold; background: none; border: none; padding: 10px; }
        .remove-item:hover { color: #ff3b30; transform: scale(1.1); }

        /* סיכום הזמנה (צד שמאל) */
        .cart-summary-side { flex: 1; background: var(--element-navy-gradient); padding: 35px; color: #fff; display: flex; flex-direction: column; }
        .summary-title { font-size: 22px; font-weight: 900; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 15px; color: rgba(255,255,255,0.8); font-weight: 500; }
        .free-shipping { color: var(--brand-green); font-weight: 900; }
        
        .total-row { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 25px; font-size: 22px; font-weight: 900; display: flex; justify-content: space-between; align-items: center; }
        
        .checkout-btn {
            background: var(--brand-green); color: #fff; border: none; padding: 18px; border-radius: 12px;
            font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 25px; transition: 0.3s; width: 100%;
            box-shadow: 0 5px 15px rgba(124, 168, 86, 0.3);
        }
        .checkout-btn:hover { background: #6b9449; transform: translateY(-3px); }
        .checkout-btn:disabled { opacity: 0.5; pointer-events: none; }

        /* מצב עגלה ריקה */
        .empty-cart-msg { text-align: center; padding: 50px; display: none; }
        .empty-cart-msg a { display: inline-block; margin-top: 15px; background: var(--text-dark); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .empty-cart-msg a:hover { background: var(--brand-green); }

        /* --- טיקר תחתון --- */
        .footer { 
            background: var(--element-navy-gradient); border-top: 2px solid var(--brand-green); 
            width: 100%; height: 45px; flex-shrink: 0; 
            display: flex; align-items: center; overflow: hidden;
        }
        #ticker-placeholder { width: 100%; display: flex; align-items: center; }
        
        .ticker-wrap { display: inline-flex; white-space: nowrap; animation: ticker 30s linear infinite; direction: ltr !important; }
        .ticker-item { color: #ffffff !important; font-weight: 700; font-size: 14px; display: inline-block; margin: 0 15px; vertical-align: middle; direction: rtl !important; }
        .ticker-separator { color: var(--brand-green); font-weight: 900; margin: 0 15px; font-size: 15px; display: inline-block; vertical-align: middle; transform: translateY(-1px); }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100vw); } }

        /* ==============================================
           רספונסיביות - שומר על העיצוב בכל המסכים!
           ============================================== */
        
        /* התאמה ללפטופים/מסכים בינוניים (סימטרי ומכווץ יפה) */
        @media (max-width: 1024px) {
            .cart-window { width: 98%; }
            .cart-items-side { padding: 20px; }
            .cart-summary-side { padding: 25px; }
            .item-img { width: 60px; height: 60px; margin-left: 15px; }
        }

        /* התאמה למובייל (סידור בטור במקום שורה) */
        @media (max-width: 800px) {
            .cart-window { flex-direction: column; overflow-y: auto; }
            .cart-summary-side { flex: none; }
            html, body { overflow-y: auto; height: auto; }
            .main-content { padding: 20px 10px; }
            .cart-item { flex-wrap: wrap; }
            .quantity-controls { margin: 10px 0 0 0; width: fit-content; }
            .remove-item { margin-left: auto; margin-right: 0; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="cart-window">
            <div class="cart-items-side">
                <div class="cart-items-inner" id="cart-items-list">
                    </div>
                <div id="empty-msg" class="empty-cart-msg">
                    <h2 style="color: var(--text-gray);">העגלה שלך ריקה...</h2>
                    <a href="store.html">חזור לחנות לרכישות</a>
                </div>
            </div>

            <div class="cart-summary-side">
                <h2 class="summary-title">סיכום הזמנה</h2>
                <div class="summary-row"><span>פריטים:</span> <span id="items-count">0</span></div>
                <div class="summary-row"><span>משלוח:</span> <span class="free-shipping">חינם!</span></div>
                <div class="total-row"><span>סה"כ:</span> <span id="total-price">0 ₪</span></div>
                <button class="checkout-btn" id="checkout-btn" onclick="goToCheckout()">המשך לתשלום</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div id="ticker-placeholder"></div>
    </footer>

    <script>
        fetch('header.html').then(res => res.text()).then(data => document.getElementById('header-placeholder').innerHTML = data);
        fetch('ticker.html').then(res => res.text()).then(data => document.getElementById('ticker-placeholder').innerHTML = data);

       // הפונקציה המעודכנת שעובדת עם אובייקטים אמיתיים מהחנות של סוליבי
        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('solibiCart')) || [];
            const list = document.getElementById('cart-items-list');
            const emptyMsg = document.getElementById('empty-msg');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            let totalItems = 0;
            let totalPrice = 0;

            list.innerHTML = '';

            if (cart.length === 0) {
                emptyMsg.style.display = 'block';
                checkoutBtn.disabled = true;
            } else {
                emptyMsg.style.display = 'none';
                checkoutBtn.disabled = false;

                cart.forEach((item, index) => {
                    totalItems += item.quantity;
                    totalPrice += (item.price * item.quantity);

                    // תמיכה בתמונה רגילה או באייקון SVG 
                    let imageHTML = item.img && item.img.includes('<svg') ? item.img : `<img src="${item.img || 'mystery-box.jpg.png'}" alt="${item.name}">`;

                    list.innerHTML += `
                        <div class="cart-item">
                            <div class="item-img">${imageHTML}</div>
                            <div class="item-info">
                                <div class="item-title">${item.name}</div>
                                <div class="item-price">${item.price} ₪</div>
                            </div>
                            <div class="quantity-controls">
                                <button class="q-btn" onclick="updateItemQuantity(${index}, 1)">+</button>
                                <span class="q-num">${item.quantity}</span>
                                <button class="q-btn" onclick="updateItemQuantity(${index}, -1)">-</button>
                            </div>
                            <button class="remove-item" onclick="removeFromCart(${index})" title="הסר פריט">✕</button>
                        </div>
                    `;
                });
            }
            
            updateSummary(totalItems, totalPrice);
        }

        function updateSummary(count, price) {
            document.getElementById('items-count').innerText = count;
            document.getElementById('total-price').innerText = price + ' ₪';
            
            // עדכון כמות העגלה למעלה בהדר
            try { 
                if(typeof updateCartDisplay === 'function') updateCartDisplay(); 
            } catch(e) {}
        }

        // שינוי כמות מתוך העגלה בזמן אמת
        function updateItemQuantity(index, change) {
            let cart = JSON.parse(localStorage.getItem('solibiCart')) || [];
            if (cart[index]) {
                cart[index].quantity += change;
                if (cart[index].quantity <= 0) {
                    cart.splice(index, 1);
                }
                localStorage.setItem('solibiCart', JSON.stringify(cart));
                renderCart();
            }
        }

        // מחיקת מוצר לגמרי
        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('solibiCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('solibiCart', JSON.stringify(cart));
            renderCart();
        }

        function goToCheckout() {
            let cart = JSON.parse(localStorage.getItem('solibiCart')) || [];
            if (cart.length > 0) {
                window.location.href = 'checkout.html';
            } else {
                alert("העגלה שלך ריקה. אנא הוסף מוצרים לפני המעבר לתשלום.");
            }
        }

        window.onload = renderCart;
    </script>

    <script src="search.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
