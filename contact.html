<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוליבי ספורט - צור קשר</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="global-theme.css">
    
    <style>
        /* === פלטת הצבעים החדשה: זהב ושחור === */
        :root {
            --brand-gold: #D6B953; 
            --brand-gold-light: #FDF3C6; 
            --brand-gold-dark: #A88D31; 
            --bg-black: #0a0a0a;
            --bg-card: #141414;
            --text-white: #f5f5f5;
            --text-gray: #a0a0a0;
            --border-gold: rgba(214, 185, 83, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Rubik', sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            width: 100%;
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important; /* הפקודה שדורסת את הכל וממרכזת אנכית */
            padding: 20px !important;
            overflow-y: auto !important;
        }

        /* --- ענן התוכן המרכזי (מוגדל וממורכז) --- */
        .contact-cloud {
            width: 100%;
            max-width: 1050px; /* הוגדל מ-900 */
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid var(--border-gold);
            padding: 60px 50px; /* הוגדל הריווח הפנימי */
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact-subtitle {
            font-size: 18px; /* הוגדל מעט */
            color: var(--text-gray);
            font-weight: 500;
            margin-bottom: 45px;
            text-align: center;
            line-height: 1.5;
        }

        /* --- גריד קוביות הקשר --- */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px; /* רווח טיפה יותר גדול בין הקוביות */
            width: 100%;
            margin-bottom: 50px;
        }

        .contact-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px 15px; /* יותר גובה לקוביות */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: var(--text-white);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--border-gold);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
        }

        .contact-card:hover {
            transform: translateY(-8px);
            border-color: var(--brand-gold);
            box-shadow: 0 15px 30px rgba(214, 185, 83, 0.15);
        }

        .contact-icon {
            width: 50px; height: 50px;
            color: var(--brand-gold);
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .contact-card:hover .contact-icon { transform: scale(1.15); color: var(--brand-gold-light); }

        .contact-method { font-size: 20px; font-weight: 900; margin-bottom: 5px; }
        .contact-detail { font-size: 15px; font-weight: 500; color: var(--text-gray); direction: ltr; }

        /* קו הפרדה אלגנטי */
        .divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
            margin: 0 0 40px 0;
        }

        /* --- רשתות חברתיות ואתר נוסף --- */
        .social-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            flex-wrap: wrap;
            gap: 20px;
        }

        .social-links {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: #000;
            border: 1px solid var(--border-gold);
            display: flex; align-items: center; justify-content: center;
            color: var(--brand-gold);
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .social-btn:hover { background: var(--brand-gold); color: #000; transform: translateY(-3px); border-color: var(--brand-gold); }
        .social-btn svg { width: 22px; height: 22px; }

        .business-link-card {
            background: rgba(214, 185, 83, 0.1);
            border: 1px solid var(--brand-gold);
            padding: 15px 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-white);
            transition: 0.3s;
            min-width: 220px;
        }
        .business-link-card:hover { background: var(--brand-gold); color: #000; transform: scale(1.02); }

        /* === פוטר וטיקר === */
        .footer { 
            background: var(--brand-gold); 
            padding: 8px 0; 
            border-top: 2px solid #000; 
            overflow: hidden; 
            white-space: nowrap; 
            width: 100%; 
            direction: ltr; 
            flex-shrink: 0; 
            z-index: 1000;
            display: flex;
            align-items: center;
            height: 40px;
        }
        
        #ticker-placeholder { width: 100%; }
        
        @media (max-width: 900px) {
            .contact-grid { grid-template-columns: repeat(2, 1fr); }
            .social-section { flex-direction: column; justify-content: center; }
        }
        @media (max-width: 600px) {
            .contact-grid { grid-template-columns: 1fr; }
            html, body { overflow-y: auto; height: auto; } 
        }
    </style>
</head>
<body>

    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                const placeholder = document.getElementById('header-placeholder');
                if(placeholder) placeholder.innerHTML = data;
            })
            .catch(error => console.error('שגיאה בטעינת ה-Header:', error));

        fetch('ticker.html')
            .then(response => response.text())
            .then(data => {
                const placeholder = document.getElementById('ticker-placeholder');
                if(placeholder) placeholder.innerHTML = data;
            })
            .catch(error => console.error('שגיאה בטעינת ה-Ticker:', error));
    </script>
