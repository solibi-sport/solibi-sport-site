<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוליבי - מונדיאל 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="translations.js"></script>
    <link rel="stylesheet" href="global-theme.css">
    
    <style>
        :root {
            --wc-gold: #d4af37;
            --wc-gold-glow: rgba(212, 175, 55, 0.4);
            --wc-bg: linear-gradient(135deg, #100a1c 0%, #1a1025 50%, #061224 100%);
            --wc-card: rgba(255, 255, 255, 0.05);
            --wc-card-hover: rgba(255, 255, 255, 0.08);
            --text-light: #e2e8f0;
            --text-dark: #0b1221;
            --white: #ffffff;
            --border-wc: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* =========================================
           1. הגדרות המסך: נעול לחלוטין (בדיוק כמו בדף הטבלאות)
           ========================================= */
        html, body {
            font-family: 'Rubik', sans-serif; 
            background: var(--wc-bg); 
            color: var(--white);
            width: 100%;
            height: 100vh; /* נעול לגובה המסך */
            overflow: hidden; /* מונע גלילה כפולה החוצה */
            display: flex;
            flex-direction: column;
        }

        /* 2. הדר וטיקר: לא מתכווצים, שומרים על גובה קבוע */
        #header-placeholder { 
            flex-shrink: 0;
            width: 100%;
            height: 70px;
            background: #061224; 
            border-bottom: 2px solid #d4af37; 
            z-index: 100;
        }

        .footer {
            flex-shrink: 0;
            width: 100%;
            z-index: 100;
        }

        /* 3. האזור המרכזי שבין ההדר לטיקר */
        .main-content {
            flex: 1; /* דוחף את הטיקר למטה ולוקח את כל האמצע */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* קריטי כדי שהגלילה תקרה רק בפנים! */
            padding: 20px;
            width: 100%;
        }

        /* 4. עטיפת התוכן */
        .dashboard-wrapper {
            width: 100%; 
            max-width: 1600px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden; /* מעביר את האחריות פנימה */
        }

        .page-header {
            flex-shrink: 0; /* הכותרת תמיד נשארת במקום */
            display: flex; 
            flex-direction: column; 
            align-items: center;
            margin-bottom: 20px; 
            text-align: center;
        }

        /* =========================================
           5. הקסם שלך: אזור הגלילה הפנימי בלבד!
           ========================================= */
        .wc-scroll-area {
            flex: 1; /* תופס את שאר המקום מתחת לכותרת */
            overflow-y: auto; /* מפעיל את פס הגלילה רק כאן! */
            overflow-x: hidden;
            padding-right: 10px;
            padding-bottom: 20px;
            direction: ltr; /* מעביר את פס הגלילה לימין */
        }

        .wc-scroll-area > * {
            direction: rtl; /* מחזיר את התוכן לעברית */
        }

        /* עיצוב פס הגלילה הפנימי */
        .wc-scroll-area::-webkit-scrollbar { width: 8px; }
        .wc-scroll-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .wc-scroll-area::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

        /* =========================================
           עיצובי התוכן (בדיוק כמו שהיו)
           ========================================= */
        .wc-title {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 900;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        .wc-controls {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid var(--border-wc);
            display: flex; gap: 15px; align-items: center;
            backdrop-filter: blur(10px);
        }

        .wc-select {
            background: #d4af37; color: var(--text-dark);
            padding: 8px 20px 8px 40px; border-radius: 30px;
            font-size: clamp(14px, 1.5vw, 16px); font-weight: 900;
            border: none; outline: none; cursor: pointer; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230b1221' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: left 15px center; background-size: 14px;
        }

        .all-groups-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: clamp(15px, 2vw, 25px); width: 100%;
        }

        .mini-group-card {
            background: var(--wc-card); border: 1px solid var(--border-wc);
            border-radius: 16px; padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: 0.3s; cursor: pointer;
        }
        .mini-group-card:hover {
            transform: translateY(-5px); border-color: #d4af37; background: var(--wc-card-hover);
        }

        .mini-group-title {
            text-align: center; font-weight: 900; font-size: 18px; color: #d4af37;
            margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;
        }

        table { width: 100%; border-collapse: collapse; font-size: clamp(12px, 1.2vw, 14px); }
        th { color: #a0aec0; padding: 8px 2px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: normal; }
        td { padding: 8px 2px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        
        .team-identity { display: flex; align-items: center; gap: 8px; direction: rtl; text-align: right; justify-content: flex-start; }
        .team-name-text { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;} 
        .team-logo { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
        .points { color: #d4af37; font-weight: 900; font-size: 16px; }

        .rank-promote { color: #4ade80; font-weight: bold; }
        .rank-normal { color: #94a3b8; font-weight: bold; }

        .single-group-view { display: flex; gap: clamp(20px, 2vw, 30px); width: 100%; display: none; align-items: stretch; }

        .sg-table-side, .sg-fixtures-side {
            background: var(--wc-card); border: 1px solid var(--border-wc);
            border-radius: 20px; padding: clamp(15px, 2vw, 25px); display: flex; flex-direction: column;
        }
        
        .sg-table-side { flex: 1.2; transition: 0.3s; }
        .sg-fixtures-side { flex: 1; transition: 0.3s; }

        .section-title {
            color: #d4af37; font-size: clamp(18px, 1.5vw, 22px); font-weight: 900;
            margin-bottom: 20px; text-align: center; padding-bottom: 10px; border-bottom: 1px solid var(--border-wc);
        }

        .wc-match-row {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 8px; transition: 0.2s; cursor: pointer;
        }
        .wc-match-row:hover { background: rgba(212, 175, 55, 0.1); }
        .match-team { flex: 1; display: flex; align-items: center; font-weight: 600; font-size: 14px;}
        .team-home { justify-content: flex-end; gap: 8px; }
        .team-away { justify-content: flex-start; gap: 8px; }
        .match-center { display: flex; flex-direction: column; align-items: center; margin: 0 15px; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .match-score { font-size: 18px; font-weight: 900; color: #d4af37; letter-spacing: 2px;}
        .match-status { font-size: 10px; color: #a0aec0; font-weight: bold; margin-bottom: 2px;}

        .stats-grid { display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; }
        .stat-card { background: var(--wc-card); border: 1px solid var(--border-wc); border-radius: 16px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stat-player { display: flex; align-items: center; gap: 12px; }
        .stat-player img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2);}
        .stat-value { font-weight: 900; color: #d4af37; font-size: 18px;}

        @media (max-width: 1024px) {
            .single-group-view { flex-direction: column; }
            .team-name-text { max-width: none; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="dashboard-wrapper">
            
            <div class="page-header">
                <div class="wc-title" id="tournament-title">מונדיאל 2026 🏆</div>
                <div class="wc-controls">
                    <select id="group-selector" class="wc-select" onchange="toggleViewMode(this.value)">
                        <option value="all">🌐 צפה בכל הבתים</option>
                        <option value="stats">📊 סטטיסטיקות מונדיאל</option>
                        <option value="knockout">⚔️ שלבי נוקאאוט</option>
                    </select>
                </div>
            </div>

            <div class="wc-scroll-area">
                
                <div id="all-groups-view" class="all-groups-grid">
                    <div style="text-align:center; grid-column: 1/-1; padding: 40px; color: #d4af37;">
                        <h2>שואב נתונים מפיפ"א... ⏳</h2>
                    </div>
                </div>

                <div id="single-group-view" class="single-group-view">
                    <div class="sg-table-side">
                        <div class="section-title" id="sg-title">בית נבחר</div>
                        <div id="sg-table-container"></div>
                    </div>
                    <div class="sg-fixtures-side">
                        <div class="section-title">לוח משחקים ותוצאות</div>
                        <div id="sg-fixtures-container" style="overflow-y: auto; max-height: 400px; padding-right: 5px;"></div>
                    </div>
                </div>

                <div id="stats-view" class="stats-grid">
                    <div class="stat-card"><div class="section-title">⚽ מלך השערים</div><div id="stats-scorers">מחפש נתונים...</div></div>
                    <div class="stat-card"><div class="section-title">👟 בישולים</div><div id="stats-assists">מחפש נתונים...</div></div>
                    <div class="stat-card"><div class="section-title">🟨 כרטיסים צהובים</div><div id="stats-yellow">מחפש נתונים...</div></div>
                    <div class="stat-card"><div class="section-title">🟥 כרטיסים אדומים</div><div id="stats-red">מחפש נתונים...</div></div>
                </div>

            </div> </div>
    </main>

    <footer class="footer">
        <div id="ticker-placeholder"></div>
    </footer>

    <script>
        const API_KEY = 'd580159a7d19ead2bc2054c8b57e6ee3';
        const BASE_URL = 'https://v3.football.api-sports.io';
        
        const urlParams = new URLSearchParams(window.location.search);
        const LEAGUE_ID = urlParams.get('id') || 1; 
        
        // הגדרת עונה 2026 
        const SEASON = urlParams.get('season') || 2026;

        let allGroupsData = [];
        let allFixturesData = [];
        let statsLoaded = false;

        function getHebrewName(englishName) {
            if (!englishName) return "";
            const cleanName = englishName.trim();
            if (typeof myDictionary !== 'undefined' && myDictionary[cleanName]) {
                return myDictionary[cleanName];
            }
            return cleanName;
        }

        function translateGroupName(name) {
            if (!name) return "";
            let lowerName = name.toLowerCase();
            if (lowerName.includes('group')) {
                let gName = name.replace(/Group/i, 'בית').trim();
                gName = gName.replace('A', "א'").replace('B', "ב'").replace('C', "ג'").replace('D', "ד'")
                             .replace('E', "ה'").replace('F', "ו'").replace('G', "ז'").replace('H', "ח'")
                             .replace('I', "ט'").replace('J', "י'").replace('K', "יא'").replace('L', "יב'");
                return gName;
            }
            return name;
        }

        async function initWorldCup() {
            try {
                const stdRes = await fetch(`${BASE_URL}/standings?league=${LEAGUE_ID}&season=${SEASON}`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const stdData = await stdRes.json();
                
                if (stdData.response && stdData.response.length > 0) {
                    allGroupsData = stdData.response[0].league.standings;
                }

                const fixRes = await fetch(`${BASE_URL}/fixtures?league=${LEAGUE_ID}&season=${SEASON}`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const fixData = await fixRes.json();
                if (fixData.response) {
                    allFixturesData = fixData.response;
                }

                buildDropdown();
                renderAllGroupsGrid();

            } catch (err) {
                console.error("שגיאה במשיכת נתוני מונדיאל:", err);
                document.getElementById('all-groups-view').innerHTML = '<div style="text-align:center; grid-column: 1/-1; padding: 40px; color: #ff4a4a;"><h2>שגיאה במשיכת הנתונים. נסה שוב מאוחר יותר.</h2></div>';
            }
        }

        function buildDropdown() {
            const select = document.getElementById('group-selector');
            allGroupsData.forEach((group, index) => {
                let hebrewName = translateGroupName(group[0].group);
                if (hebrewName.includes("בית") && !group[0].group.includes("Stage") && group.length <= 4) {
                    select.innerHTML += `<option value="${index}">${hebrewName}</option>`;
                }
            });
        }

        function renderAllGroupsGrid() {
            const container = document.getElementById('all-groups-view');
            
            if (allGroupsData.length === 0) {
                 container.innerHTML = '<div style="text-align:center; grid-column: 1/-1; padding: 40px; color: #a0aec0;"><h2>אין נתונים זמינים כרגע או שהמשחקים טרם נקבעו סופית.</h2></div>';
                 return;
            }

            let html = '';
            allGroupsData.forEach((group, index) => {
                let hebrewName = translateGroupName(group[0].group);
                if (!hebrewName.includes("בית") || group[0].group.includes("Stage") || group.length > 4) return;

                html += `
                <div class="mini-group-card" onclick="document.getElementById('group-selector').value = '${index}'; toggleViewMode('${index}');">
                    <div class="mini-group-title">${hebrewName}</div>
                    <table>
                        <tr><th></th><th style="text-align:right">נבחרת</th><th>מש'</th><th>הפרש</th><th>נק'</th></tr>`;
                
                group.forEach(team => {
                    let rankClass = team.rank <= 2 ? 'rank-promote' : 'rank-normal';
                    let tName = getHebrewName(team.team.name);
                    html += `
                        <tr>
                            <td class="${rankClass}">${team.rank}</td>
                            <td>
                                <div class="team-identity">
                                    <img src="${team.team.logo}" class="team-logo">
                                    <span class="team-name-text">${tName}</span>
                                </div>
                            </td>
                            <td>${team.all.played}</td>
                            <td dir="ltr">${team.goalsDiff}</td>
                            <td><strong class="points">${team.points}</strong></td>
                        </tr>`;
                });
                html += `</table></div>`;
            });
            container.innerHTML = html;
        }

        function toggleViewMode(value) {
            const allView = document.getElementById('all-groups-view');
            const singleView = document.getElementById('single-group-view');
            const statsView = document.getElementById('stats-view');

            allView.style.display = 'none';
            singleView.style.display = 'none';
            statsView.style.display = 'none';
            
            // איפוס עיצוב במקרה שחזרנו מנוקאאוט
            document.querySelector('.sg-fixtures-side').style.display = 'flex';
            document.querySelector('.sg-table-side').style.flex = '1.2';

            if (value === 'all') {
                allView.style.display = 'grid';
            } else if (value === 'knockout') {
                singleView.style.display = 'flex';
                renderKnockoutView();
            } else if (value === 'stats') {
                statsView.style.display = 'grid';
                loadStatsData();
            } else {
                singleView.style.display = 'flex';
                renderSingleGroup(parseInt(value));
            }
        }

        async function loadStatsData() {
            if(statsLoaded) return;
            
            const renderList = (containerId, data, valKey) => {
                let html = '';
                if(!data || data.length === 0) {
                    document.getElementById(containerId).innerHTML = '<div style="text-align:center; color:#a0aec0; padding: 20px;">טרם נקבעו נתונים סטטיסטיים בטורניר.</div>';
                    return;
                }
                data.slice(0, 10).forEach((item, idx) => {
                    let pName = getHebrewName(item.player.name);
                    let photo = item.player.photo;
                    let teamLogo = item.statistics[0].team.logo;
                    
                    let keys = valKey.split('.');
                    let finalVal = item.statistics[0];
                    keys.forEach(k => finalVal = finalVal[k]);

                    html += `
                    <div class="stat-row">
                        <div class="stat-player">
                            <span style="color:#a0aec0; font-size:12px; width:15px;">${idx+1}</span>
                            <img src="${photo}" onerror="this.src='https://media.api-sports.io/football/players/1.png'">
                            <div style="display:flex; flex-direction:column;">
                                <span style="font-size:14px; font-weight:600;">${pName}</span>
                                <img src="${teamLogo}" style="width:16px; margin-top:2px;">
                            </div>
                        </div>
                        <div class="stat-value">${finalVal || 0}</div>
                    </div>`;
                });
                document.getElementById(containerId).innerHTML = html;
            };

            try {
                const reqOpts = { headers: { 'x-apisports-key': API_KEY } };
                const [scorers, assists, yellow, red] = await Promise.all([
                    fetch(`${BASE_URL}/players/topscorers?league=${LEAGUE_ID}&season=${SEASON}`, reqOpts).then(r=>r.json()).catch(()=>null),
                    fetch(`${BASE_URL}/players/topassists?league=${LEAGUE_ID}&season=${SEASON}`, reqOpts).then(r=>r.json()).catch(()=>null),
                    fetch(`${BASE_URL}/players/topyellowcards?league=${LEAGUE_ID}&season=${SEASON}`, reqOpts).then(r=>r.json()).catch(()=>null),
                    fetch(`${BASE_URL}/players/topredcards?league=${LEAGUE_ID}&season=${SEASON}`, reqOpts).then(r=>r.json()).catch(()=>null)
                ]);

                renderList('stats-scorers', scorers?.response, 'goals.total');
                renderList('stats-assists', assists?.response, 'goals.assists');
                renderList('stats-yellow', yellow?.response, 'cards.yellow');
                renderList('stats-red', red?.response, 'cards.red');

                statsLoaded = true;
            } catch(e) {
                console.error(e);
            }
        }

        function renderSingleGroup(groupIndex) {
            const group = allGroupsData[groupIndex];
            const hebrewName = translateGroupName(group[0].group);
            document.getElementById('sg-title').innerText = hebrewName;

            let tableHtml = `<table>
                <tr><th></th><th style="text-align:right">נבחרת</th><th>מש'</th><th>נצ'</th><th>תיקו</th><th>הפ'</th><th>ש.ז</th><th>ש.ח</th><th>הפרש</th><th>נק'</th></tr>`;
            
            let teamIdsInGroup = []; 

            group.forEach(team => {
                teamIdsInGroup.push(team.team.id);
                let rankClass = team.rank <= 2 ? 'rank-promote' : 'rank-normal';
                let tName = getHebrewName(team.team.name);
                tableHtml += `
                    <tr>
                        <td class="${rankClass}">${team.rank}</td>
                        <td>
                            <div class="team-identity">
                                <img src="${team.team.logo}" class="team-logo" style="width:24px; height:24px;">
                                <span class="team-name-text" style="font-size:15px;">${tName}</span>
                            </div>
                        </td>
                        <td>${team.all.played}</td>
                        <td>${team.all.win}</td>
                        <td>${team.all.draw}</td>
                        <td>${team.all.lose}</td>
                        <td>${team.all.goals.for}</td>
                        <td>${team.all.goals.against}</td>
                        <td dir="ltr">${team.goalsDiff}</td>
                        <td><strong class="points" style="font-size:18px;">${team.points}</strong></td>
                    </tr>`;
            });
            tableHtml += `</table>`;
            document.getElementById('sg-table-container').innerHTML = tableHtml;

            const groupFixtures = allFixturesData.filter(m => 
                teamIdsInGroup.includes(m.teams.home.id) && teamIdsInGroup.includes(m.teams.away.id)
            ).sort((a, b) => a.fixture.timestamp - b.fixture.timestamp);

            let fixHtml = '';
            if (groupFixtures.length === 0) {
                fixHtml = "<div style='text-align:center; padding: 20px;'>טרם פורסמו משחקים לבית זה</div>";
            } else {
                groupFixtures.forEach(m => {
                    let hName = getHebrewName(m.teams.home.name);
                    let aName = getHebrewName(m.teams.away.name);
                    let dateObj = new Date(m.fixture.date);
                    let dateStr = dateObj.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit'});
                    let timeStr = dateObj.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    let shortStatus = m.fixture.status.short;
                    let statusDisplay = timeStr;
                    let scoreDisplay = 'VS';

                    if (['FT', 'AET', 'PEN'].includes(shortStatus)) { statusDisplay = 'הסתיים'; scoreDisplay = `${m.goals.home} - ${m.goals.away}`; }
                    else if (['1H', '2H', 'HT'].includes(shortStatus)) { statusDisplay = `${m.fixture.status.elapsed}'`; scoreDisplay = `${m.goals.home} - ${m.goals.away}`; }

                    let safeHome = encodeURIComponent(m.teams.home.name);
                    let safeAway = encodeURIComponent(m.teams.away.name);

                    fixHtml += `
                    <div class="wc-match-row" onclick="if(typeof openMatchEvents === 'function') openMatchEvents(${m.fixture.id}, '${safeHome}', '${safeAway}')">
                        <div class="match-team team-home"><span>${hName}</span><img src="${m.teams.home.logo}" style="width:22px;"></div>
                        <div class="match-center"><span class="match-status">${dateStr} | ${statusDisplay}</span><span class="match-score">${scoreDisplay}</span></div>
                        <div class="match-team team-away"><img src="${m.teams.away.logo}" style="width:22px;"><span>${aName}</span></div>
                    </div>`;
                });
            }
            document.getElementById('sg-fixtures-container').innerHTML = fixHtml;
        }

        // --- שאיבת הנוקאאוט ישירות מה-API ---
        function renderKnockoutView() {
            document.getElementById('sg-title').innerText = "שלבי נוקאאוט";
            
            // מעלים את צד הלוח משחקים ומותח את צד הטבלה שיתפוס את כל הרוחב
            document.querySelector('.sg-fixtures-side').style.display = 'none';
            document.querySelector('.sg-table-side').style.flex = '1';

            // מפלטר רק את המשחקים שהם *לא* שלב בתים
            const knockoutFixtures = allFixturesData.filter(m => {
                let r = m.league.round || "";
                return !r.toLowerCase().includes("group") && !r.toLowerCase().includes("regular");
            }).sort((a, b) => a.fixture.timestamp - b.fixture.timestamp);

            if (knockoutFixtures.length === 0) {
                document.getElementById('sg-table-container').innerHTML = "<div style='padding:40px; text-align:center;'>טרם נקבעו משחקי נוקאאוט בטורניר.</div>";
                return;
            }

            // מקבץ את המשחקים לפי שלב (שמינית, רבע וכו')
            let roundsObj = {};
            knockoutFixtures.forEach(m => {
                let r = m.league.round;
                let hebrewRound = r;
                if(r.includes('16')) hebrewRound = 'שמינית גמר';
                else if(r.includes('Quarter')) hebrewRound = 'רבע גמר';
                else if(r.includes('Semi')) hebrewRound = 'חצי גמר';
                else if(r.includes('3rd') || r.includes('Third')) hebrewRound = 'משחק על המקום השלישי';
                else if(r.includes('Final')) hebrewRound = 'גמר מונדיאל';
                
                if(!roundsObj[hebrewRound]) roundsObj[hebrewRound] = [];
                roundsObj[hebrewRound].push(m);
            });

            let html = `<div style="display: flex; flex-direction: column; gap: 30px; padding-bottom: 20px;">`;
            
            for (let roundName in roundsObj) {
                html += `<div>
                    <h3 style="color: var(--wc-gold); text-align: center; margin-bottom: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 10px;">${roundName}</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px;">`;
                
                roundsObj[roundName].forEach(m => {
                    let hName = getHebrewName(m.teams.home.name);
                    let aName = getHebrewName(m.teams.away.name);
                    let dateObj = new Date(m.fixture.date);
                    let dateStr = dateObj.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit'});
                    let timeStr = dateObj.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    let shortStatus = m.fixture.status.short;
                    let statusDisplay = timeStr;
                    let scoreDisplay = 'VS';

                    // מציג תוצאות כולל פנדלים והארכה אם היו
                    if (['FT', 'AET', 'PEN'].includes(shortStatus)) { 
                        statusDisplay = 'הסתיים'; 
                        scoreDisplay = `${m.goals.home} - ${m.goals.away}`; 
                        if (shortStatus === 'PEN') {
                            scoreDisplay = `${m.score.penalty.home} - ${m.score.penalty.away} (פ)`;
                        } else if (shortStatus === 'AET') {
                            scoreDisplay += ' (ה)';
                        }
                    } else if (['1H', '2H', 'HT', 'ET', 'P'].includes(shortStatus)) { 
                        statusDisplay = `${m.fixture.status.elapsed}'`; 
                        scoreDisplay = `${m.goals.home} - ${m.goals.away}`; 
                    }

                    let safeHome = encodeURIComponent(m.teams.home.name);
                    let safeAway = encodeURIComponent(m.teams.away.name);

                    html += `
                    <div class="wc-match-row" onclick="if(typeof openMatchEvents === 'function') openMatchEvents(${m.fixture.id}, '${safeHome}', '${safeAway}')" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(212, 175, 55, 0.1);">
                        <div class="match-team team-home"><span>${hName}</span><img src="${m.teams.home.logo}" style="width:28px;"></div>
                        <div class="match-center"><span class="match-status">${dateStr} | ${statusDisplay}</span><span class="match-score" style="font-size: 16px;">${scoreDisplay}</span></div>
                        <div class="match-team team-away"><img src="${m.teams.away.logo}" style="width:28px;"><span>${aName}</span></div>
                    </div>`;
                });
                
                html += `</div></div>`;
            }
            
            html += `</div>`;
            document.getElementById('sg-table-container').innerHTML = html;
        }

        initWorldCup();

        fetch('ticker.html').then(response => response.text()).then(data => {
            const placeholder = document.getElementById('ticker-placeholder');
            if(placeholder) placeholder.innerHTML = data;
        });

        fetch('header.html').then(response => response.text()).then(data => {
            const placeholder = document.getElementById('header-placeholder');
            if(placeholder) placeholder.innerHTML = data;
        });

    </script>
 <script src="matchEvents.js"></script>
</body>
</html>
