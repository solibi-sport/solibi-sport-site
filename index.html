<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוליבי ספורט - עולם שלם של כדורגל</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* הצבע הירוק של הלוגו */
            --brand-green: #7ca856;      
            --brand-green-glow: rgba(124, 168, 86, 0.6);
            
            /* רקע האתר - כסוף/אפור טיפה בהיר */
            --bg-silver-matte: linear-gradient(145deg, #eef4f9 0%, #c9d4e0 100%);
            
            /* צבע האלמנטים (משבצות, הדר, פוטר) - בלו נייבי */
            --element-navy-gradient: radial-gradient(circle at top left, #1e4266 0%, #112845 100%);
            
            /* צבעי טקסט */
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: var(--bg-silver-matte);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* ביטול גלילה מוחלט */
        }

        /* --- שורה עליונה (Header) - נעלנו את הגובה כדי שתמיד תהיה צרה --- */
        .header {
            background: var(--element-navy-gradient);
            height: 75px; /* נעילת גובה השורה - לא תתרחב יותר! */
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.20);
            border-bottom: 2px solid var(--brand-green);
            z-index: 100;
            flex-shrink: 0;
            position: relative;
        }

        .header-logo {
            display: flex;
            align-items: center;
            height: 100%;
        }

        /* --- הלוגו: חתוך ומוגדל בלי להרוס את השורה --- */
        .actual-logo-img {
            height: 50px; /* גובה פיזי נמוך */
            width: auto;
            transform: scale(2.2); /* מגדיל ויזואלית כמו זכוכית מגדלת */
            transform-origin: right center;
            transition: transform 0.3s ease;
        }

        .actual-logo-img:hover {
            transform: scale(2.3);
        }

        /* --- התפריט: מקובע תמיד לאמצע המסך בסופר סימטריה --- */
        .header-nav {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .header-nav ul {
            list-style: none;
            display: flex;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        /* נעילת צבע התפריט ללבן (מעלים את הסגול!) */
        .header-nav a {
            text-decoration: none !important;
            color: var(--text-light) !important; 
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            position: relative;
        }

        .header-nav a:hover {
            color: var(--brand-green) !important;
        }

        .header-nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 50%;
            background-color: var(--brand-green);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        
        .header-nav a:hover::after {
            width: 100%;
        }

        /* --- שורת חיפוש: נמוכה, אלגנטית ומאוד רחבה --- */
        .header-search input {
            padding: 0 20px;
            height: 38px; /* צרה בגובה */
            width: 400px; /* רחבה למתיחה */
            border: none;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            font-family: 'Rubik', sans-serif;
            color: #000;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .header-search input:focus {
            box-shadow: 0 0 12px var(--brand-green-glow);
            background-color: #ffffff;
            width: 430px;
        }

        /* --- תוכן מרכזי (Grid) --- */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 5%;
            min-height: 0;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 750px;
            align-content: center;
        }

        /* --- משבצות בלו נייבי --- */
        .square-box {
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            background: var(--element-navy-gradient);
            box-shadow: 
                0 8px 20px rgba(0,0,0,0.25), 
                inset 0 1px 1px rgba(255,255,255,0.15);
            border: 1px solid rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            text-decoration: none;
        }

        .square-box::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .square-box:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 
                0 15px 30px rgba(0,0,0,0.35), 
                0 0 25px var(--brand-green-glow);
            border-color: var(--brand-green);
        }
        
        .square-box:hover::after {
            border-color: var(--brand-green);
            opacity: 0.5;
        }

        /* --- שורה תחתונה (Footer Ticker) --- */
        .footer {
            background: var(--element-navy-gradient);
            padding: 12px 0;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.20);
            flex-shrink: 0;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--brand-green);
            box-shadow: 0 0 10px var(--brand-green-glow);
        }

        .ticker-wrap {
            display: inline-block;
            padding-right: 100%;
            animation: ticker 35s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 35px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-light);
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .ticker-divider {
            color: var(--brand-green);
            font-weight: 900;
            margin: 0 15px;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        @media (max-width: 900px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); max-width: 500px; }
            body { overflow: auto; height: auto; }
        }
        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; max-width: 280px; }
            .header { height: auto; flex-direction: column; gap: 15px; padding: 20px 10px; }
            .header-nav { position: relative; left: auto; transform: none; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-logo">
            <a href="#">
                <img src="a.jpg" alt="לוגו סוליבי ספורט" class="actual-logo-img">
            </a>
        </div>
        
        <nav class="header-nav">
            <ul>
                <li><a href="#">דף הבית</a></li>
                <li><a href="#">ארכיון</a></li>
                <li><a href="#">אודות</a></li>
                <li><a href="#">צור קשר</a></li>
            </ul>
        </nav>

        <div class="header-search">
            <input type="text" placeholder="חיפוש קבוצה, שחקן...">
        </div>
    </header>

    <main class="main-content">
        <div class="grid-container">
            <a href="#" class="square-box"></a>
            <a href="#" class="square-box"></a>
            <a href="#" class="square-box"></a>
            <a href="#" class="square-box"></a>
            <a href="#" class="square-box"></a>
            <a href="#" class="square-box"></a>
        </div>
    </main>

    <footer class="footer">
        <div class="ticker-wrap">
            <span class="ticker-item">מכבי ת"א ניצחה 2-0 את הפועל באר שבע</span>
            <span class="ticker-divider">•</span>
            <span class="ticker-item">סיכום המחזור ה-15 בליגת העל פורסם באתר</span>
            <span class="ticker-divider">•</span>
            <span class="ticker-item">שוק ההעברות: שחקן חדש חתם בהפועל תל אביב</span>
            <span class="ticker-divider">•</span>
            <span class="ticker-item">הערב: משחק העונה - בית"ר ירושלים מארחת את מכבי חיפה</span>
            <span class="ticker-divider">•</span>
            <span class="ticker-item">עדכון פנטזי: חלון החילופים פתוח עד יום שבת ב-14:00</span>
        </div>
    </footer>

</body>
</html>
