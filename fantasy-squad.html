<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הקבוצה שלי - טוטאל פנטזי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .soccer-field {
            background-color: #15803d;
            background-image: 
                radial-gradient(circle at center, transparent 0, transparent 100px, rgba(255,255,255,0.2) 100px, rgba(255,255,255,0.2) 102px, transparent 102px),
                linear-gradient(to bottom, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 100% 100%, 100% 10%;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <div class="max-w-6xl mx-auto p-4">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow-sm">
            <h1 class="text-2xl font-black text-blue-900">🏆 הטוטאל פנטזי: הקבוצה שלי</h1>
            <div id="budget-display" class="bg-green-100 text-green-800 px-4 py-2 rounded-full font-bold">
                תקציב פנוי: ₪100,000,000
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 soccer-field rounded-xl p-8 relative shadow-2xl border-4 border-white/30 min-h-[700px] flex flex-col justify-around">
                <div class="absolute inset-4 border-2 border-white/20 rounded pointer-events-none"></div>
                <div class="absolute top-1/2 left-0 w-full h-0.5 bg-white/20 -translate-y-1/2 pointer-events-none"></div>
                <div class="absolute top-1/2 left-1/2 w-32 h-32 border-2 border-white/20 rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
                
                <div id="attack-row" class="flex justify-center gap-8 z-10 min-h-[100px] items-center text-white/50 text-sm font-bold">חלוצים</div>
                <div id="midfield-row" class="flex justify-center gap-8 z-10 min-h-[100px] items-center text-white/50 text-sm font-bold">קשרים</div>
                <div id="defense-row" class="flex justify-center gap-8 z-10 min-h-[100px] items-center text-white/50 text-sm font-bold">הגנה</div>
                <div id="gk-row" class="flex justify-center z-10 min-h-[100px] items-center text-white/50 text-sm font-bold">שוער</div>
            </div>

            <div class="bg-gray-900 text-white rounded-xl p-6 shadow-xl">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2">📋 ספסל וניהול</h2>
                <div id="bench-list" class="space-y-3">
                    <p class="text-gray-400 text-sm italic">ממתין לשחקנים...</p>
                </div>
                
                <button class="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-lg shadow-lg transition-all transform active:scale-95">
                    שמור הרכב שבועי 💾
                </button>
            </div>

        </div>
    </div>

    <script type="module">
        // מייבא את החיבור מהקובץ שיצרת עכשיו!
        import { supabase } from './api/supabaseClient.js';

        async function init() {
            console.log("מתחבר למערכת הפנטזי...");
            console.log(supabase); // נוודא שהחיבור עובד
        }

        init();
    </script>
</body>
</html>
