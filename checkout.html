<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוליבי ספורט - קופה ותשלום מאובטח</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="header-style.css">
    
    <style>
        :root {
            --brand-green: #7ca856;
            --bg-silver-matte: linear-gradient(145deg, #f5f5f5 0%, #e0e0e0 100%);
            --element-navy-gradient: linear-gradient(145deg, #0a2e57 0%, #062141 100%);
            --text-dark: #062141;
            --text-gray: #475569;
            --border-color: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: 'Rubik', sans-serif; background: var(--bg-silver-matte); width: 100%; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; overflow: hidden; }
        
        .premium-title-wrapper { margin-bottom: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 100%; }
        .page-title { background: #ffffff; padding: 10px 50px; border-radius: 40px; font-size: 24px; font-weight: 900; color: var(--text-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px;}

        /* חלון התשלום */
        .checkout-window {
            width: 95%; max-width: 1200px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            display: flex; flex-direction: row; overflow: hidden; flex: 1;
        }

        /* אזור הטפסים (צד ימין) */
        .checkout-form-side { flex: 1.8; padding: 30px 40px; overflow-y: auto; }
        
        .form-section { background: #fff; padding: 25px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .form-section-title { font-size: 18px; font-weight: 900; color: var(--text-dark); border-bottom: 2px solid rgba(124,168,86,0.3); padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* גריד שדות */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-grid.full { grid-template-columns: 1fr; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 12px; font-weight: 700; color: var(--text-gray); }
        .input-group input, .input-group select { 
            font-family: inherit; padding: 12px 15px; border: 1px solid var(--border-color); 
            border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; background: #f8fafc;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--brand-green); box-shadow: 0 0 0 3px rgba(124,168,86,0.1); background: #fff; }

        /* אפשרויות משלוח */
        .shipping-options { display: flex; flex-direction: column; gap: 10px; }
        .shipping-option { display: flex; align-items: center; justify-content: space-between; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; transition: 0.2s; background: #f8fafc; }
        .shipping-option:hover { border-color: var(--brand-green); }
        .shipping-option input[type="radio"] { accent-color: var(--brand-green); width: 18px; height: 18px; cursor: pointer; }
        .shipping-info { display: flex; align-items: center; gap: 15px; }
        .shipping-text strong { display: block; color: var(--text-dark); font-size: 14px; }
        .shipping-text span { font-size: 11px; color: var(--text-gray); }
        .shipping-price { font-weight: 900; color: var(--brand-green); }
        
        /* טופס אשראי */
        .credit-card-box { background: linear-gradient(135deg, #0f172a, #1e293b); padding: 25px; border-radius: 12px; color: #fff; margin-top: 10px; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .credit-card-box::after { content: ''; position: absolute; top: -50%; right: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); pointer-events: none; }
        .cc-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
        .cc-input:focus { border-color: #fff; background: rgba(255,255,255,0.15); box-shadow: none !important;}
        .cc-input::placeholder { color: rgba(255,255,255,0.5); }
        .cc-logos { display: flex; gap: 10px; position: absolute; top: 20px; left: 20px; }
        .cc-logos img { height: 20px; filter: grayscale(1) brightness(2); }

        /* סיכום הזמנה (צד שמאל) */
        .checkout-summary-side { flex: 1; background: var(--element-navy-gradient); padding: 35px; color: #fff; display: flex; flex-direction: column; overflow-y: auto;}
        .summary-title { font-size: 20px; font-weight: 900; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .order-items-mini { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; max-height: 200px; overflow-y: auto; padding-left: 5px;}
        .order-items-mini::-webkit-scrollbar { width: 4px; }
        .order-items-mini::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .mini-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .mini-img { width: 40px; height: 40px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px;}
        .mini-info { flex: 1; display: flex; flex-direction: column; }
        .mini-name { font-size: 12px; font-weight: 700; }
        .mini-qty { font-size: 10px; color: rgba(255,255,255,0.6); }
        .mini-price { font-weight: 900; color: var(--brand-green); font-size: 13px;}

        .calc-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: rgba(255,255,255,0.8); }
        .total-row { margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; font-size: 22px; font-weight: 900; color: #fff; display: flex; justify-content: space-between;}
        
        .pay-btn {
            background: var(--brand-green); color: #fff; border: none; padding: 20px; border-radius: 12px;
            font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 30px; transition: 0.3s; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 20px rgba(124, 168, 86, 0.4);
        }
        .pay-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(124, 168, 86, 0.5); background: #88bc5f;}

        .secure-badge { text-align: center; margin-top: 15px; font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* מודאל הצלחה */
        .success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6, 33, 65, 0.9);
            z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        .success-overlay.active { opacity: 1; pointer-events: all; }
        .success-modal {
            background: #fff; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-overlay.active .success-modal { transform: scale(1); }
        .success-icon { width: 80px; height: 80px; background: var(--brand-green); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px auto; box-shadow: 0 10px 20px rgba(124,168,86,0.4); }
        .success-title { font-size: 24px; font-weight: 900; color: var(--text-dark); margin-bottom: 10px; }
        .success-desc { font-size: 14px; color: var(--text-gray); line-height: 1.5; margin-bottom: 20px; }
        .loader-bar { width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; position: relative; }
        .loader-progress { position: absolute; top: 0; right: 0; height: 100%; background: var(--brand-green); width: 0%; transition: width 3s linear; }

        /* --- טיקר תחתון --- */
        .footer { 
            background: var(--element-navy-gradient); border-top: 2px solid var(--brand-green); 
            width: 100%; height: 45px; flex-shrink: 0; 
            display: flex; align-items: center; overflow: hidden;
        }
        #ticker-placeholder { width: 100%; display: flex; align-items: center; }
        .ticker-wrap { display: inline-flex; white-space: nowrap; animation: ticker 30s linear infinite; direction: ltr !important; }
        .ticker-item { color: #ffffff !important; font-weight: 700; font-size: 14px; display: inline-block; margin: 0 15px; vertical-align: middle; direction: rtl !important; }
        .ticker-separator { color: var(--brand-green); font-weight: 900; margin: 0 15px; font-size: 15px; display: inline-block; vertical-align: middle; transform: translateY(-1px); }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100vw); } }

        @media (max-width: 900px) {
            .checkout-window { flex-direction: column-reverse; overflow-y: auto; }
            .checkout-form-side { padding: 20px; }
            .checkout-summary-side { flex: none; border-bottom: 2px solid var(--brand-green); }
            html, body { overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="main-content">
        <div class="premium-title-wrapper">
            <h1 class="page-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--brand-green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                תשלום <span style="color: var(--brand-green);">מאובטח</span>
            </h1>
        </div>

        <div class="checkout-window">
            
            <div class="checkout-form-side">
                
                <div class="form-section">
                    <h2 class="form-section-title"><span style="font-size: 20px;">👤</span> פרטים אישיים</h2>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>שם פרטי</label>
                            <input type="text" placeholder="למשל: ישראל">
                        </div>
                        <div class="input-group">
                            <label>שם משפחה</label>
                            <input type="text" placeholder="למשל: ישראלי">
                        </div>
                        <div class="input-group">
                            <label>דואר אלקטרוני</label>
                            <input type="email" placeholder="email@example.com">
                        </div>
                        <div class="input-group">
                            <label>מספר טלפון</label>
                            <input type="tel" placeholder="05X-XXXXXXX" dir="ltr" style="text-align: right;">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="form-section-title"><span style="font-size: 20px;">🚚</span> כתובת ומשלוח</h2>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>עיר / יישוב</label>
                            <input type="text" placeholder="הכנס עיר">
                        </div>
                        <div class="input-group">
                            <label>רחוב ומספר בית</label>
                            <input type="text" placeholder="הכנס כתובת מדויקת">
                        </div>
                        <div class="input-group">
                            <label>דירה / קומה (אופציונלי)</label>
                            <input type="text" placeholder="למשל: דירה 4">
                        </div>
                        <div class="input-group">
                            <label>מיקוד</label>
                            <input type="text" placeholder="מיקוד 7 ספרות">
                        </div>
                    </div>
                    
                    <h3 style="font-size: 14px; font-weight: 700; color: var(--text-dark); margin: 20px 0 10px 0;">שיטת משלוח</h3>
                    <div class="shipping-options">
                        <label class="shipping-option">
                            <div class="shipping-info">
                                <input type="radio" name="shipping" value="0" checked onchange="updateShipping(0)">
                                <div class="shipping-text">
                                    <strong>נקודת איסוף (Boxit)</strong>
                                    <span>הגעה תוך 3-5 ימי עסקים</span>
                                </div>
                            </div>
                            <div class="shipping-price">חינם</div>
                        </label>
                        <label class="shipping-option">
                            <div class="shipping-info">
                                <input type="radio" name="shipping" value="35" onchange="updateShipping(35)">
                                <div class="shipping-text">
                                    <strong>שליח עד הבית (Express)</strong>
                                    <span>הגעה תוך 1-3 ימי עסקים</span>
                                </div>
                            </div>
                            <div class="shipping-price">₪35</div>
                        </label>
                    </div>
                </div>

                <div class="form-section">
                    <h2 class="form-section-title"><span style="font-size: 20px;">💳</span> אמצעי תשלום</h2>
                    <div class="credit-card-box">
                        <div class="cc-logos">
                            <div style="background:#fff; color:#000; font-weight:900; font-size:10px; padding:2px 6px; border-radius:4px;">VISA</div>
                            <div style="background:#fff; color:#000; font-weight:900; font-size:10px; padding:2px 6px; border-radius:4px;">MC</div>
                        </div>
                        <div style="margin-top: 20px;">
                            <div class="input-group" style="margin-bottom: 15px;">
                                <label style="color: rgba(255,255,255,0.8);">מספר כרטיס אשראי</label>
                                <input type="text" class="cc-input" placeholder="XXXX XXXX XXXX XXXX" dir="ltr" style="text-align: left; font-size: 16px; letter-spacing: 2px;">
                            </div>
                            <div class="form-grid">
                                <div class="input-group">
                                    <label style="color: rgba(255,255,255,0.8);">תוקף (MM/YY)</label>
                                    <input type="text" class="cc-input" placeholder="MM/YY" dir="ltr" style="text-align: center;">
                                </div>
                                <div class="input-group">
                                    <label style="color: rgba(255,255,255,0.8);">CVV</label>
                                    <input type="password" class="cc-input" placeholder="•••" dir="ltr" style="text-align: center;" maxlength="3">
                                </div>
                            </div>
                            <div class="input-group" style="margin-top: 15px;">
                                <label style="color: rgba(255,255,255,0.8);">שם בעל הכרטיס</label>
                                <input type="text" class="cc-input" placeholder="כפי שמופיע על הכרטיס">
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="checkout-summary-side">
                <h2 class="summary-title">סיכום הזמנה</h2>
                
                <div class="order-items-mini" id="checkout-items-list">
                    </div>

                <div class="calc-row"><span>סכום ביניים:</span> <span id="calc-subtotal">0 ₪</span></div>
                <div class="calc-row"><span>דמי משלוח:</span> <span id="calc-shipping">0 ₪</span></div>
                
                <div class="total-row"><span>סה"כ לתשלום:</span> <span id="calc-total" style="color: var(--brand-green);">0 ₪</span></div>
                
                <button class="pay-btn" onclick="processPayment()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    שלם עכשיו
                </button>
                
                <div class="secure-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    הרכישה מוצפנת ומאובטחת בתקן SSL מחמיר
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div id="ticker-placeholder"></div>
    </footer>

    <div class="success-overlay" id="successOverlay">
        <div class="success-modal">
            <div class="success-icon">✔</div>
            <h2 class="success-title">התשלום בוצע בהצלחה!</h2>
            <p class="success-desc">תודה שקנית בסוליבי ספורט.<br>מספר ההזמנה וקבלה נשלחו אליך למייל.</p>
            <div class="loader-bar">
                <div class="loader-progress" id="loaderProgress"></div>
            </div>
            <p style="font-size: 11px; color: #94a3b8; margin-top: 10px;">מעביר אותך חזרה לחנות...</p>
        </div>
    </div>

    <script>
        // טעינת ההדר והטיקר
        fetch('header.html').then(res => res.text()).then(data => document.getElementById('header-placeholder').innerHTML = data);
        fetch('ticker.html').then(res => res.text()).then(data => document.getElementById('ticker-placeholder').innerHTML = data);

        let subtotal = 0;
        let shippingCost = 0;

        function loadOrderData() {
            const count = parseInt(localStorage.getItem('solibiCartCount')) || 0;
            
            // אם העגלה ריקה, נחזיר לחנות
            if (count === 0) {
                alert("העגלה שלך ריקה. מחזיר אותך לחנות.");
                window.location.href = 'store.html';
                return;
            }

            // יצירת רשימה ויזואלית
            const list = document.getElementById('checkout-items-list');
            list.innerHTML = '';
            
            for(let i=0; i<count; i++) {
                list.innerHTML += `
                    <div class="mini-item">
                        <div class="mini-img">📦</div>
                        <div class="mini-info">
                            <span class="mini-name">מוצר סוליבי פרימיום</span>
                            <span class="mini-qty">כמות: 1</span>
                        </div>
                        <span class="mini-price">99 ₪</span>
                    </div>
                `;
            }

            subtotal = count * 99; // חישוב דמה לפי המחיר הקבוע
            updateTotals();
        }

        function updateShipping(cost) {
            shippingCost = cost;
            updateTotals();
        }

        function updateTotals() {
            document.getElementById('calc-subtotal').innerText = subtotal + ' ₪';
            document.getElementById('calc-shipping').innerText = shippingCost === 0 ? 'חינם' : shippingCost + ' ₪';
            document.getElementById('calc-total').innerText = (subtotal + shippingCost) + ' ₪';
        }

        function processPayment() {
            // הופעת חלון ההצלחה
            const overlay = document.getElementById('successOverlay');
            overlay.classList.add('active');
            
            // הפעלת אנימציית פס טעינה
            setTimeout(() => {
                document.getElementById('loaderProgress').style.width = '100%';
            }, 100);

            // איפוס העגלה וחזרה לחנות אחרי 3 שניות
            setTimeout(() => {
                localStorage.removeItem('solibiCartCount');
                window.location.href = 'store.html';
            }, 3000);
        }

        window.onload = loadOrderData;
    </script>
    <script src="search.js"></script>
</body>
</html>
