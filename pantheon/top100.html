<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תבנית סוליבי ספורט - דף חדש</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-green: #7ca856;
            --brand-green-glow: rgba(124, 168, 86, 0.6);
            --bg-silver-matte: linear-gradient(145deg, #eef4f9 0%, #c9d4e0 100%);
            --element-navy-gradient: radial-gradient(circle at top left, #1e4266 0%, #112845 100%);
            --text-light: #ffffff;
            --text-dark: #112845;
            --sidebar-width: clamp(240px, 20vw, 320px); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Rubik', sans-serif;
            background: var(--bg-silver-matte);
            width: 100%;
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* === הדר עליון (מעוצב ומלא) === */
        .header {
            height: 65px;
            background: var(--element-navy-gradient);
            border-bottom: 2px solid var(--brand-green);
            position: relative;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px; 
            flex-shrink: 0;
            width: 100%;
        }

        /* התיקון: חלוקת ההדר ל-3 עמודות מדויקות */
        .header-right-col { width: var(--sidebar-width); display: flex; justify-content: center; align-items: center; }
        .header-center-col { display: flex; justify-content: center; align-items: center; gap: clamp(15px, 2vw, 30px); flex: 1; }
        .header-left-col { width: var(--sidebar-width); display: flex; justify-content: center; align-items: center; }

        .logo-wrapper {
            background-color: #ffffff; padding: 0 28px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25); transition: 0.3s; height: 52px; 
            display: flex; align-items: center; justify-content: center; text-decoration: none;
        }
        .logo-wrapper:hover { transform: scale(1.05); }
        .actual-logo-img { height: 38px; transform: scale(1.7); display: block; object-fit: contain; }

      .header-nav ul { list-style: none; display: flex; gap: clamp(8px, 1vw, 20px); align-items: center; margin: 0; padding: 0; }
        .header-nav a { text-decoration: none; color: var(--text-light); font-weight: 700; font-size: clamp(13px, 1.1vw, 15px); padding: 6px 14px; border-radius: 8px; transition: 0.3s; }
        .header-nav a:hover { background: #ffffff; color: var(--brand-green); }

        .personal-area-btn {
            background: transparent; border: 1.5px solid var(--brand-green);
            color: #ffffff; padding: 6px 16px; border-radius: 30px; text-decoration: none;
            font-weight: 700; font-size: clamp(12px, 1vw, 14px); display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; white-space: nowrap;
        }
        .personal-area-btn:hover { background: var(--brand-green); color: #ffffff; border-color: var(--brand-green); transform: scale(1.05); }

        .header-search { position: relative; width: 65%; height: 34px; transition: width 0.4s ease; }
        .header-search input { 
            width: 100%; height: 100%; border: none; background: rgba(255, 255, 255, 0.95); 
            border-radius: 30px; padding: 0 20px; outline: none; transition: 0.4s; font-family: inherit; font-size: 13px;
        }
        .header-search:focus-within { width: 100%; }
        .header-search input:focus { box-shadow: 0 0 15px var(--brand-green-glow); background: #fff; z-index: 10; }

        /* === גוף הדף === */
        .main-content { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* === תפריט ימני === */
        .vertical-action-bar {
            position: absolute; top: 20px; right: 20px; width: var(--sidebar-width);
            height: 48px; background: var(--element-navy-gradient); border: 2px solid var(--brand-green);
            border-radius: 24px; display: flex; flex-direction: column; overflow: hidden;
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s, background 0.4s 0.5s, border-color 0.4s 0.5s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100;
        }
        .vertical-action-bar:hover {
            height: 220px; background: var(--brand-green); border-color: #fff;
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0s, background 0.4s 0s, border-color 0.4s 0s;
        }
        .v-action-header { height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px; color: #fff; font-weight: 900; font-size: 14px; flex-shrink: 0; cursor: default; }
        .v-action-items { display: flex; flex-direction: column; gap: 10px; padding: 10px 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s 0.5s; }
        .vertical-action-bar:hover .v-action-items { opacity: 1; pointer-events: auto; transition: opacity 0.3s 0.2s; }
        .v-item { color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .v-item:hover { transform: translateX(-5px); text-shadow: 0 0 5px #fff; border-bottom-color: #fff; }
        .v-item svg { width: 18px; height: 18px; stroke: currentColor; }

        /* === פאנל לייב משמאל (מעוצב ומלא) === */
        .collapsible-live-panel {
            position: absolute; top: 20px; left: 20px; width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px);
            border: 2px solid var(--brand-green); border-radius: 16px;
            display: flex; flex-direction: column; overflow: hidden; z-index: 50;
            height: 48px; transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .collapsible-live-panel.expanded { height: calc(100% - 40px); background: rgba(255, 255, 255, 0.9); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .panel-header { font-size: 14px; font-weight: 900; color: var(--text-dark); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 44px; flex-shrink: 0; cursor: pointer; transition: 0.3s; }
        .panel-header:hover { background: rgba(255,255,255,0.4); }
        .header-title-group { display: flex; align-items: center; gap: 8px; }
        .toggle-arrow { transition: transform 0.4s ease; color: var(--text-dark); width: 20px; height: 20px;}
        .collapsible-live-panel.expanded .toggle-arrow { transform: rotate(180deg); }
        .panel-content { position: relative; flex: 1; padding: 10px 0; overflow: hidden; opacity: 0; transition: opacity 0.3s; }
        .collapsible-live-panel.expanded .panel-content { opacity: 1; overflow-y: auto; }
        .panel-content::-webkit-scrollbar { width: 4px; }
        .panel-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }

        /* עיצוב כרטיסיות המשחקים בתוך הפאנל */
        .live-league-header { display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.7); padding: 4px 10px; border-radius: 6px; color: var(--text-dark); font-size: 11px; font-weight: 900; margin-top: 5px; border-right: 3px solid var(--brand-green); }
        .live-league-header img { width: 14px; height: 14px; object-fit: contain; }
        .live-match-card-light { background: #fff; border: 1px solid rgba(0,0,0,0.05); border-right: 4px solid transparent; border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: var(--text-dark); transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); direction: rtl; margin: 0 10px 8px 10px; }
        .live-match-card-light:hover { transform: translateY(-2px); border-right-color: var(--brand-green); box-shadow: 0 4px 10px rgba(124,168,86,0.2); }
        .match-teams-col { display: flex; flex-direction: column; gap: 6px; font-size: 12px; font-weight: 700; flex: 1; min-width: 0; }
        .team-line { display: flex; align-items: center; gap: 8px; height: 16px; }
        .team-line img { width: 16px; height: 16px; object-fit: contain; flex-shrink: 0;}
        .team-line span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: 105px; }
        .match-score-col { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 40px; flex-shrink: 0; background: #f0f4f8; padding: 4px 8px; border-radius: 6px; position: relative;}
        .match-score-col .score-num { font-size: 13px; font-weight: 700; height: 16px; display: flex; align-items: center; }
        .match-score-col .minute { font-size: 10px; color: #7ca856; font-weight: bold; height: 14px; display: flex; align-items: center; margin-bottom: 4px;}

        /* === מעטפת התוכן המרכזית (סימטריה) === */
        .center-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 100%; height: 100%; padding: 0 calc(var(--sidebar-width) + 30px);
            gap: clamp(15px, 3vh, 35px); 
        }

        /* === עיצוב הכותרת המיוחדת והשליטה במיקום === */
        .premium-title-wrapper {
            display: flex; align-items: center; justify-content: center; gap: 15px; 
            width: 100%; max-width: 950px; flex-shrink: 0; 
            transform: translateY(-40px); /* מנגנון הרמה והורדה של הכותרת! */
        }
        .title-line { height: 2px; flex: 1; background: linear-gradient(90deg, transparent, var(--brand-green)); border-radius: 2px; }
        .title-line.left { background: linear-gradient(270deg, transparent, var(--brand-green)); }
        .page-title {
            background: rgba(255, 255, 255, 0.6); padding: 8px 30px; border-radius: 30px;
            border: 1px solid rgba(124, 168, 86, 0.3); font-size: clamp(18px, 2vw, 24px); 
            font-weight: 900; white-space: nowrap; margin: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* === פוטר וטיקר (הקוד המלא והרץ) === */
        .footer { background: var(--element-navy-gradient); padding: 8px 0; border-top: 2px solid var(--brand-green); overflow: hidden; white-space: nowrap; width: 100%; direction: ltr; flex-shrink: 0; z-index: 1000;}
        .ticker-wrap { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; }
        .ticker-item { color: #ffffff !important; font-weight: 700; font-size: clamp(12px, 1vw, 14px); display: inline-block; direction: rtl; vertical-align: middle; }
        .ticker-separator { color: var(--brand-green); font-weight: 900; margin: 0 25px; font-size: 15px; display: inline-block; vertical-align: middle; transform: translateY(-1px); }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100vw); } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        @media (max-width: 1200px) {
            html, body { overflow: auto; height: auto; }
            .center-wrapper { padding: 120px 20px; height: auto; justify-content: flex-start; gap: 30px;}
            .collapsible-live-panel, .vertical-action-bar { position: relative; margin: 0 auto 20px; width: 100%; max-width: 600px; left: auto; right: auto; top: auto; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-right-col">
            <a href="../index.html" class="logo-wrapper">
                <img src="../a.png" alt="לוגו" class="actual-logo-img">
            </a>
        </div>
        
        <div class="header-center-col">
            <a href="#" class="personal-area-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>לאזור האישי</span>
            </a>
            <nav class="header-nav">
                <ul>
                    <li><a href="../index.html">דף הבית</a></li>
                    <li><a href="../#">ארכיון</a></li>
                    <li><a href="../#">קרדיטים</a></li>
                    <li><a href="../#">אודות</a></li>
                    <li><a href="../#">צור קשר</a></li>
                </ul>
            </nav>
        </div>

        <div class="header-left-col">
            <div class="header-search"><input type="text" placeholder="חיפוש תוכן..."></div>
        </div>
    </header>

    <main class="main-content">
        <aside class="vertical-action-bar">
            <div class="v-action-header">
                <span>תפריט ניווט</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div class="v-action-items">
                <a href="#" class="v-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><span>מידע נוסף</span></a>
                <a href="#" class="v-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span>הורדות</span></a>
            </div>
        </aside>

        <aside class="collapsible-live-panel" id="livePanel">
            <div class="panel-header" id="live-panel-header">
                <div class="header-title-group">
                    <span>תוצאות לייב</span>
                    <span style="color:red; font-size:14px; animation: blink 1.5s infinite;">⬤</span>
                </div>
                <svg class="toggle-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div class="panel-content" id="live-content">
                <div style="text-align:center; padding: 40px 10px; font-weight: bold; color: #112845;">טוען משחקים... ⚽</div>
            </div>
        </aside>

        <div class="center-wrapper">
            
            <div class="premium-title-wrapper">
                <div class="title-line"></div>
                <h1 class="page-title">
                    <span style="color: var(--text-dark);">שם</span>
                    <span style="color: var(--brand-green);">הדף</span>
                    <span style="color: var(--text-dark);">שלך</span>
                </h1>
                <div class="title-line left"></div>
            </div>

            <div style="width: 100%; text-align: center; color: var(--text-dark); font-weight: 500; font-size: 20px;">
                [הכנס את הגריד או התוכן כאן]
            </div>

        </div>
    </main>

    <div id="ticker-placeholder"></div>

    <script>
        // ניהול פתיחת פאנל לייב
        document.addEventListener('DOMContentLoaded', () => {
            const liveHeader = document.getElementById('live-panel-header');
            const livePanel = document.getElementById('livePanel');
            if (liveHeader && livePanel) {
                liveHeader.addEventListener('click', (e) => {
                    e.stopPropagation();
                    livePanel.classList.toggle('expanded');
                });
            }
            document.addEventListener('click', (e) => {
                if (livePanel?.classList.contains('expanded') && !livePanel.contains(e.target)) {
                    livePanel.classList.remove('expanded');
                }
            });
        });

        // ==========================================
        // === מנוע שאיבת נתוני לייב (קוד המלא) ===
        // ==========================================
        const LEAGUE_NAMES_MAP = { 383: "ליגת העל", 384: "ליגה לאומית", 39: "פרמייר ליג", 140: "ספרדית ראשונה", 135: "איטלקית ראשונה", 78: "גרמנית ראשונה", 61: "צרפתית ראשונה", 88: "הולנדית ראשונה", 144: "בלגית ראשונה", 94: "פורטוגלית ראשונה", 203: "טורקית ראשונה", 2: "ליגת האלופות", 3: "הליגה האירופית", 848: "ליגת הקונפרנס", 13: "ליברטדורס", 11: "סודאמריקנה", 1: "מונדיאל" };
        const ORDERED_LEAGUES = [ 383, 384, 39, 140, 135, 78, 61, 40, 41, 42, 141, 136, 79, 62, 88, 144, 94, 203, 179, 119, 113, 106, 218, 107, 345, 332, 271, 286, 373, 283, 172, 197, 318, 333, 235, 362, 343, 71, 72, 128, 268, 239, 265, 253, 262, 307, 301, 98, 292, 169, 288, 233, 200, 188, 2, 3, 848, 5, 4, 13, 11, 9, 17, 6, 1 ];
        
        window.allLiveMatches = []; 
        window.currentLivePage = 0; 

        async function fetchLiveMatches() {
            try {
                const res = await fetch(`/api/football-proxy?endpoint=fixtures&live=all`);
                const data = await res.json();
                window.allLiveMatches = (data.response || []).sort((a, b) => {
                    let idxA = ORDERED_LEAGUES.indexOf(a.league.id);
                    let idxB = ORDERED_LEAGUES.indexOf(b.league.id);
                    return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
                });
                renderLivePage();
            } catch (e) { console.error("Live fetch error", e); }
        }

        function renderLivePage() {
            const contentDiv = document.getElementById('live-content');
            if (!window.allLiveMatches || window.allLiveMatches.length === 0) {
                contentDiv.innerHTML = '<div style="text-align:center; padding: 40px 10px; font-weight: bold; color: #112845;">אין כרגע משחקים חיים ⚽</div>';
                return;
            }

            const startIndex = window.currentLivePage * 6;
            const pageMatches = window.allLiveMatches.slice(startIndex, startIndex + 6);

            const grouped = {};
            pageMatches.forEach(m => {
                let leagueName = LEAGUE_NAMES_MAP[m.league.id] || m.league.name;
                if(!grouped[leagueName]) grouped[leagueName] = { logo: m.league.logo, matches: [] };
                grouped[leagueName].matches.push(m);
            });

            let allHtml = '';
            Object.keys(grouped).forEach(leagueName => {
                const leagueData = grouped[leagueName];
                let leagueHtml = `
                    <div class="live-league-header">
                        <img src="${leagueData.logo}">
                        <span>${leagueName}</span>
                    </div>
                `;
                let matchesHtml = '';
                
                leagueData.matches.forEach(m => {
                    const currentHome = m.goals.home !== null ? m.goals.home : 0;
                    const currentAway = m.goals.away !== null ? m.goals.away : 0;
                    let matchStatus = '';
                    const shortStatus = m.fixture.status.short;
                    if (['FT', 'AET', 'PEN'].includes(shortStatus)) matchStatus = 'סיום';
                    else if (shortStatus === 'HT') matchStatus = 'מחצית';
                    else if (m.fixture.status.elapsed) matchStatus = `${m.fixture.status.elapsed}'`;
                    else matchStatus = 'לא התחיל';

                    // קריטי לפתיחת החלון הצף!
                    const safeHomeName = encodeURIComponent(m.teams.home.name);
                    const safeAwayName = encodeURIComponent(m.teams.away.name);

                    matchesHtml += `
                        <a href="#" onclick="if(typeof openMatchEvents==='function') openMatchEvents(${m.fixture.id}, '${safeHomeName}', '${safeAwayName}'); return false;" class="live-match-card-light">
                            <div class="match-teams-col">
                                <div class="team-line"><img src="${m.teams.home.logo}"> <span>${m.teams.home.name}</span></div>
                                <div class="team-line"><img src="${m.teams.away.logo}"> <span>${m.teams.away.name}</span></div>
                            </div>
                            <div class="match-score-col">
                                <span class="minute">${matchStatus}</span>
                                <div style="display: flex; flex-direction: column; gap: 6px; align-items: center;">
                                    <span class="score-num">${currentHome}</span>
                                    <span class="score-num">${currentAway}</span>
                                </div>
                            </div>
                        </a>
                    `;
                });
                allHtml += leagueHtml + matchesHtml;
            });

            contentDiv.innerHTML = allHtml;
        }

        setInterval(() => {
            if (window.allLiveMatches.length > 6) {
                window.currentLivePage = (window.currentLivePage + 1) % Math.ceil(window.allLiveMatches.length / 6);
                renderLivePage();
            }
        }, 10000);

        fetchLiveMatches();
        setInterval(fetchLiveMatches, 60000);

        // ==========================================
        // === שאיבת הטיקר מקובץ חיצוני ===
        // ==========================================
        fetch('../ticker.html')
            .then(res => res.text())
            .then(data => document.getElementById('ticker-placeholder').innerHTML = data)
            .catch(err => console.error('שגיאה בשאיבת הטיקר:', err));
    </script>
    <script src="../translations.js"></script>
    <script src="../matchEvents.js"></script>
</body>
</html>
