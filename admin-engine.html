<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנוע דירוג - Total Fantasy (גרסת ניקוד רשמי V4)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; text-align: center; padding: 30px; }
        .engine-box { background: #1e293b; padding: 30px; border-radius: 15px; border: 2px solid #8b5cf6; max-width: 800px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { background: #8b5cf6; color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        button:disabled { background: #64748b; cursor: not-allowed; }
        #log { margin-top: 20px; text-align: right; background: #000; padding: 15px; border-radius: 8px; height: 350px; overflow-y: auto; font-family: monospace; color: #10b981; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="engine-box">
        <h1 style="color: #c4b5fd;">⚙️ מנוע עדכון שבועי V4 (אפריל 2026)</h1>
        <p>מחשב ניקוד אמיתי לפי תקנון, שומר על 10 הבאנקרים, ומעדכן דירוגי בורסה ל-1000 שחקנים.</p>
        
        <button id="runFullEngineBtn" onclick="runFullProcess()">הפעל עדכון שבועי (אל תסגור את החלון!)</button>
        
        <div id="log">מערכת מוכנה. ממתין לפקודה...<br></div>
    </div>

    <script>
        function log(msg, type='info') {
            const logDiv = document.getElementById('log');
            const color = type === 'err' ? '#ef4444' : (type === 'success' ? '#10b981' : (type === 'warn' ? '#f59e0b' : '#60a5fa'));
            logDiv.innerHTML += `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        const getPosInfo = (apiPos) => {
            switch(apiPos) {
                case 'Attacker': return { name: 'חלוץ', goalPts: 3, csPts: 0 };
                case 'Midfielder': return { name: 'קישור', goalPts: 5, csPts: 4 };
                case 'Defender': return { name: 'הגנה', goalPts: 7, csPts: 6 };
                case 'Goalkeeper': return { name: 'שוער', goalPts: 10, csPts: 8 };
                default: return { name: 'קישור', goalPts: 5, csPts: 4 };
            }
        };

        async function runFullProcess() {
            const btn = document.getElementById('runFullEngineBtn');
            btn.disabled = true;
            log("🏁 מתחיל תהליך סנכרון שבועי V4...", 'info');

            try {
                const SUPABASE_URL = 'https://fkuvgvlxlmzmyacaosgi.supabase.co';
                const SUPABASE_KEY = 'sb_publishable_FVsN5ZdlDNAEh2w8sE9Ipw_R8g0KJkR';
                const API_FOOTBALL_KEY = 'd580159a7d19ead2bc2054c8b57e6ee3';
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                const leagueIds = [39, 140, 135, 78, 61]; 
                const currentSeason = 2025; // עונת 25/26 (אפריל 26)

                const lockedTop10 = [
                    "Lamine Yamal", "E. Haaland", "K. Mbappé", "Bruno Fernandes", "H. Kane", 
                    "Vinícius Júnior", "Raphinha", "Mohamed Salah", "J. Bellingham", "T. Courtois"
                ];

                const premiumClubs = [
                    "Real Madrid", "Bayern München", "AC Milan", "Liverpool", "Barcelona", 
                    "Juventus", "Manchester United", "Inter", "Chelsea", "Arsenal", 
                    "Borussia Dortmund", "Atletico Madrid", "Manchester City", "Paris Saint Germain", "Napoli", "Roma"
                ];

                // 1. משיכת השחקנים הקיימים מסופאבייס כדי שנדע את מי לעדכן
                log("1. מושך את 1,000 שחקני המאגר מסופאבייס...");
                const { data: dbPlayers, error: dbErr } = await supabase.from('master_players').select('*').limit(1000);
                if (dbErr) throw dbErr;
                log(`✓ נמשכו ${dbPlayers.length} שחקנים מהמאגר.`);

                // יצירת מפה של מזהי ה-API שלהם כדי לשלוף רק אותם מהרשת
                let apiDataMap = new Map();

                log("2. שואב נתוני אמת מ-API-FOOTBALL ל-5 הליגות (זה ייקח כ-2 דקות, נא להמתין)...", "warn");
                for (const lId of leagueIds) {
                    let currentPage = 1;
                    let totalPages = 1;

                    while (currentPage <= totalPages) {
                        const response = await fetch(`https://v3.football.api-sports.io/players?league=${lId}&season=${currentSeason}&page=${currentPage}`, {
                            headers: { "x-rapidapi-key": API_FOOTBALL_KEY }
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            if (result.paging) totalPages = result.paging.total;
                            
                            result.response.forEach(item => {
                                apiDataMap.set(item.player.name, item);
                            });
                        }
                        currentPage++;
                        await delay(600); // השהייה למניעת חסימה
                    }
                    log(`✓ ליגה ${lId} נסרקה בהצלחה.`);
                }

                log("3. מחשב ניקוד רשמי, עמדות, ומחיל את 'בוסט היוקרה'...");
                
                let lockedList = [];
                let competitivePool = [];

                dbPlayers.forEach(p => {
                    const freshData = apiDataMap.get(p.name);
                    let totalPts = p.points || 0; // ברירת מחדל אם אין נתונים חדשים
                    let apps = p.apps || 0, goals = p.goals || 0, assists = p.assists || 0;
                    
                    if (freshData && freshData.statistics && freshData.statistics[0]) {
                        const stats = freshData.statistics[0];
                        apps = stats.games.appearences || 0;
                        goals = stats.goals.total || 0;
                        assists = stats.goals.assists || 0;
                        
                        const posDetails = getPosInfo(stats.games.position);
                        
                        // חישוב ניקוד אמת
                        totalPts = 0;
                        totalPts += (apps * 2);
                        totalPts += (goals * posDetails.goalPts);
                        totalPts += (assists * 5);
                        totalPts += (Math.floor((stats.tackles.total || 0) / 3));
                        totalPts += Math.floor((apps * 0.28) * posDetails.csPts);
                        totalPts += Math.floor((apps * 0.5) * 4);
                        
                        const avgGoals = apps > 0 ? (goals / apps) : 0;
                        const avgAssists = apps > 0 ? (assists / apps) : 0;
                        const rating = 6.0 + (avgGoals * 1.5) + (avgAssists * 1.0);
                        if (rating >= 7.5) totalPts += (apps * 2);
                    }

                    p.apps = apps; p.goals = goals; p.assists = assists; p.points = totalPts;
                    p.powerScore = totalPts; // ציון בסיס

                    // בדיקת באנקרים
                    let isLocked = lockedTop10.findIndex(n => p.name.includes(n) || n.includes(p.name));
                    if (isLocked !== -1) {
                        p.forcedRank = isLocked;
                        lockedList.push(p);
                    } else {
                        if (premiumClubs.includes(p.team)) p.powerScore *= 1.25; // בוסט פרימיום
                        competitivePool.push(p);
                    }
                });

                // מיון ומתן בוסט סמוי ל-40 כוכבי העל
                competitivePool.sort((a, b) => b.powerScore - a.powerScore);
                for(let i=0; i<40; i++) {
                    if(competitivePool[i]) competitivePool[i].powerScore *= 1.3;
                }

                log("4. קובע דירוגי בורסה ומקצה לשווי שוק...");
                lockedList.sort((a, b) => a.forcedRank - b.forcedRank);
                competitivePool.sort((a, b) => b.powerScore - a.powerScore);
                
                let finalRankedList = [...lockedList, ...competitivePool];

                finalRankedList.forEach((p, index) => {
                    let rank = index + 1;
                    p.rank = rank;
                    if (rank <= 50) { p.tier = 'כוכב על'; p.value = Math.floor(50000000 - ((rank - 1) * ((50000000 - 35000000) / 50))); }
                    else if (rank <= 150) { p.tier = 'רמה 1'; p.value = Math.floor(34900000 - ((rank - 51) * ((34900000 - 19000000) / 100))); }
                    else if (rank <= 400) { p.tier = 'רמה 2'; p.value = Math.floor(18900000 - ((rank - 151) * ((18900000 - 10000000) / 250))); }
                    else if (rank <= 700) { p.tier = 'רמה 3'; p.value = Math.floor(9900000 - ((rank - 401) * ((9900000 - 5000000) / 300))); }
                    else { p.tier = 'רמה 4'; p.value = Math.floor(4900000 - ((rank - 701) * ((4900000 - 500000) / 300))); }
                });

                log("5. משגר את 1000 השחקנים המעודכנים בחזרה ל-Supabase...");
                for (let i = 0; i < finalRankedList.length; i += 100) {
                    const chunk = finalRankedList.slice(i, i + 100).map(p => ({
                        id: p.id, rank: p.rank, tier: p.tier, value: p.value, points: p.points,
                        apps: p.apps, goals: p.goals, assists: p.assists
                    }));
                    const { error } = await supabase.from('master_players').upsert(chunk);
                    if (error) throw error;
                }

                log("✅ העדכון השבועי עבר בהצלחה! השוק הסתנכרן.", 'success');
                btn.innerText = "הפעולה הושלמה!";
                btn.style.background = "#10b981";

            } catch (e) {
                log("❌ שגיאה: " + e.message, 'err');
                console.error(e);
                btn.disabled = false;
                btn.innerText = "נסה שוב";
            }
        }
    </script>
</body>
</html>
