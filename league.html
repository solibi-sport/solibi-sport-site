<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוליבי ספורט - ליגה אנגלית</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-green: #7ca856;
            --brand-green-glow: rgba(124, 168, 86, 0.6);
            --bg-silver-matte: linear-gradient(145deg, #eef4f9 0%, #c9d4e0 100%);
            --element-navy-gradient: radial-gradient(circle at top left, #1e4266 0%, #112845 100%);
            --text-light: #ffffff;
            --text-dark: #112845;
            --sidebar-width: clamp(280px, 22vw, 380px); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rubik', sans-serif;
            background: var(--bg-silver-matte);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* הדר (מועתק מהאתר שלך) */
        .header {
            height: 65px;
            background: var(--element-navy-gradient);
            border-bottom: 2px solid var(--brand-green);
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr var(--sidebar-width);
            align-items: center;
        }

        .logo-placeholder { color: white; font-weight: 900; padding-right: 20px; }

        /* תוכן העמוד */
        .main-content {
            flex: 1;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .league-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 900;
        }

        .league-title span { color: var(--brand-green); }

        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--element-navy-gradient); color: white; padding: 10px; font-size: 14px; }
        td { padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); text-align: center; font-weight: 600; }
        .team-name { display: flex; align-items: center; gap: 8px; text-align: right; }
        .team-logo { width: 20px; height: 20px; }

        /* פוטר (מועתק מהאתר שלך) */
        .footer { background: var(--element-navy-gradient); padding: 8px 0; border-top: 2px solid var(--brand-green); color: white; text-align: center; }

        @media (max-width: 900px) { .layout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-placeholder">SOLIBY SPORT</div>
        <div style="text-align: center; color: white; font-weight: 700;">ליגה אנגלית ראשונה</div>
        <div></div>
    </header>

    <main class="main-content">
        <h1 class="league-title">טבלת <span>הליגה</span> האנגלית</h1>
        
        <div class="layout-grid">
            <div class="card">
                <div id="api-table">טוען נתונים...</div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom: 15px;">משחקים קרובים</h3>
                <p style="color: #666; font-size: 14px;">החיבור ללוח המשחקים יבוצע בשלב הבא...</p>
            </div>
        </div>
    </main>

    <footer class="footer">נתונים חיים באדיבות API-FOOTBALL</footer>

    <script>
    const API_KEY = 'd580159a7d19ead2bc2054c8b57e6ee3';
    const SEASON = 2025; // שנת ההתחלה של העונה (למשל 2024 לעונת 24/25, או 2025 לעונת 25/26)

    // מילון תרגום קבוצות אנגליות לעברית
    const teamTranslations = {
        "Arsenal": "ארסנל",
        "Aston Villa": "אסטון וילה",
        "Bournemouth": "בורנמות'",
        "Brentford": "ברנטפורד",
        "Brighton": "ברייטון",
        "Chelsea": "צ'לסי",
        "Crystal Palace": "קריסטל פאלאס",
        "Everton": "אברטון",
        "Fulham": "פולהאם",
        "Liverpool": "ליברפול",
        "Manchester City": "מנצ'סטר סיטי",
        "Manchester United": "מנצ'סטר יונייטד",
        "Newcastle": "ניוקאסל",
        "Nottingham Forest": "נוטינגהאם פורסט",
        "Tottenham": "טוטנהאם",
        "West Ham": "ווסטהאם",
        "Wolves": "וולבס",
        "Leicester": "לסטר סיטי",
        "Ipswich": "איפסוויץ'",
        "Southampton": "סאות'המפטון"
        // אפשר להוסיף עוד קבוצות בעתיד אם יש עולות חדשות
    };
    
    async function getStandings() {
        try {
            // שים לב שעדכנו את ה-URL שישתמש במשתנה SEASON
            const response = await fetch(`https://v3.football.api-sports.io/standings?league=39&season=${SEASON}`, {
                headers: { 'x-apisports-key': API_KEY }
            });
            const data = await response.json();
            const standings = data.response[0].league.standings[0];
            
            let html = `<table><tr><th>#</th><th style="text-align:right">קבוצה</th><th>מש'</th><th>נק'</th></tr>`;
            
            standings.forEach(item => {
                // המערכת בודקת במילון - אם יש תרגום היא משתמשת בו, אם לא היא משאירה באנגלית
                const hebrewName = teamTranslations[item.team.name] || item.team.name;
                
                html += `<tr>
                    <td>${item.rank}</td>
                    <td class="team-name"><img src="${item.team.logo}" class="team-logo"> ${hebrewName}</td>
                    <td>${item.all.played}</td>
                    <td style="color:var(--brand-green); font-weight:900;">${item.points}</td>
                </tr>`;
            });
            
            html += `</table>`;
            document.getElementById('api-table').innerHTML = html;
        } catch (e) {
            document.getElementById('api-table').innerHTML = "שגיאה בטעינת הנתונים. ודא שהמפתח נכון ושיש נתונים לעונה זו.";
        }
    }
    
    getStandings();
</script>
</body>
</html>
