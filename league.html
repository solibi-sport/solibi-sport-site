<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סוליבי ספורט - מרכז ליגה</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="global-theme.css">
    
    <style>
        :root {
            --brand-gold: #D6B953; 
            --brand-gold-light: #FDF3C6; 
            --bg-black: #0a0a0a;
            --bg-card: #141414;
            --text-white: #f5f5f5;
            --text-gray: #a0a0a0;
            --border-gold: rgba(214, 185, 83, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Rubik', sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: 70px !important; 
        }

        #header-placeholder {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 70px !important;
            z-index: 9999 !important;
            background: var(--bg-black);
        }

        .footer {
            flex-shrink: 0;
            width: 100%;
            z-index: 100;
        }

        .inner-page-main {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 2.5vh 20px;
            overflow: hidden; 
            width: 100%;
        }

        .content-container {
            width: 100%;
            max-width: 1450px;
            height: 100%; 
            max-height: 85vh; 
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            padding: clamp(15px, 3vh, 30px) clamp(20px, 3vw, 40px); 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .leagues-top-bar {
            display: flex;
            align-items: center;
            justify-content: center; 
            position: relative; 
            width: 100%;
            flex-shrink: 0;
            margin-bottom: clamp(15px, 3vh, 35px); 
        }

        .premium-title-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-title {
            color: var(--text-white);
            font-size: clamp(16px, 1.8vw, 24px); 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--bg-card);
            padding: 8px 30px;
            border-radius: 30px;
            border: 1px solid var(--brand-gold);
            box-shadow: inset 0 0 15px rgba(214, 185, 83, 0.1);
            margin: 0;
            white-space: nowrap;
        }
        .page-title span { color: var(--brand-gold); }

        .title-line {
            height: 2px;
            width: clamp(50px, 8vw, 100px); 
            background: linear-gradient(90deg, transparent, var(--brand-gold));
            border-radius: 2px;
        }
        .title-line.left { background: linear-gradient(270deg, transparent, var(--brand-gold)); }

        /* === גלילה פנימית של התוכן === */
        .leagues-scroll-area {
            flex: 1; 
            overflow-y: auto; 
            padding-right: 10px; 
            padding-bottom: 20px;
            direction: ltr; 
        }
        
        .leagues-scroll-area > * {
            direction: rtl;
        }

        .leagues-scroll-area::-webkit-scrollbar { width: 6px; }
        .leagues-scroll-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .leagues-scroll-area::-webkit-scrollbar-thumb { background: rgba(214,185,83,0.3); border-radius: 10px; }
        .leagues-scroll-area::-webkit-scrollbar-thumb:hover { background: var(--brand-gold); }

        /* === אזור כפתורי הניווט הראשיים === */
        .league-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .league-tab-btn {
            background: transparent;
            border: 1px solid var(--border-gold);
            color: var(--text-gray);
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .league-tab-btn:hover { color: var(--text-white); border-color: var(--brand-gold); }
        .league-tab-btn.active {
            background: var(--brand-gold);
            color: #000;
            border-color: var(--brand-gold);
            box-shadow: 0 4px 12px rgba(214, 185, 83, 0.3);
        }

        /* === עיצוב הדפדוף בין מחזורים === */
        .round-switcher-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-gold);
        }
        .round-nav-btn {
            background: none; border: 1px solid var(--brand-gold); color: var(--brand-gold);
            padding: 6px 16px; border-radius: 20px; font-family: inherit; font-weight: 700;
            cursor: pointer; transition: 0.2s; font-size: 13px;
        }
        .round-nav-btn:hover:not(:disabled) { background: var(--brand-gold); color: #000; }
        .round-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #444; color: #444; }
        .current-round-text { font-size: 15px; font-weight: 900; color: var(--text-white); }

        /* === עיצוב תתי-טאבים של סטטיסטיקות שחקנים === */
        .stats-sub-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stats-sub-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(214,185,83,0.15);
            color: var(--text-gray); padding: 6px 16px; border-radius: 15px;
            font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .stats-sub-btn:hover { border-color: var(--brand-gold); color: var(--text-white); }
        .stats-sub-btn.active { background: rgba(214,185,83,0.15); color: var(--brand-gold); border-color: var(--brand-gold); font-weight: 700; }

        /* === עיצוב הטבלאות והמשחקים === */
        .api-table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-white);
            font-size: 14px;
        }
        .api-table th {
            background: rgba(214, 185, 83, 0.15);
            color: var(--brand-gold);
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid var(--brand-gold);
            font-weight: 900;
        }
        .api-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .api-table tr:hover td { background: rgba(255,255,255,0.03); }
        
        .team-cell, .player-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-start;
            text-align: right;
            font-weight: 700;
        }
        .team-logo, .player-img {
            width: 26px; height: 26px; object-fit: contain;
        }
        .player-img { border-radius: 50%; background: #222; }
        
        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .match-row:hover { border-color: var(--brand-gold); background: rgba(20,20,20,0.8); }
        .match-team { flex: 1; display: flex; align-items: center; gap: 12px; font-weight: 700; }
        .match-team.home { justify-content: flex-end; text-align: left; }
        .match-team.away { justify-content: flex-start; text-align: right; }
        
        .match-score {
            flex: 0 0 110px; text-align: center; font-size: 16px; font-weight: 900;
            color: var(--brand-gold); background: #000; padding: 6px 12px;
            border-radius: 20px; border: 1px solid rgba(214, 185, 83, 0.3);
        }
        .match-date { display: block; font-size: 11px; color: var(--text-gray); margin-top: 3px; font-weight: 400; }
        
        .loader { color: var(--brand-gold); font-size: 16px; font-weight: bold; padding: 50px; text-align: center; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="inner-page-main">
        <div class="content-container">
            
            <div class="leagues-top-bar">
                <div class="premium-title-wrapper">
                    <div class="title-line"></div>
                    <h1 class="page-title" id="dynamic-league-title">טוען <span>ליגה...</span></h1>
                    <div class="title-line left"></div>
                </div>
            </div>
            
            <div class="league-tabs">
                <button class="league-tab-btn active" id="tab-standings">טבלת הליגה</button>
                <button class="league-tab-btn" id="tab-fixtures">לוח משחקים ותוצאות</button>
                <button class="league-tab-btn" id="tab-stats">סטטיסטיקות שחקנים</button>
            </div>

            <div class="leagues-scroll-area" id="league-main-display">
                </div>
        </div>
    </main>

    <footer class="footer">
        <div id="ticker-placeholder"></div>
    </footer>
    
    <script>
        const API_KEY = 'd580159a7d19ead2bc2054c8b57e6ee3';
        const BASE_URL = 'https://v3.football.api-sports.io';
        
        const currentMonth = new Date().getMonth();
        const currentSeason = currentMonth > 5 ? new Date().getFullYear() : new Date().getFullYear() - 1;

        let currentLeagueId = null;
        
        // זיכרון גלובלי לניהול דפדוף המחזורים
        let allRounds = [];
        let currentRoundIndex = -1;
        let selectedRoundName = "";

        // זיכרון גלובלי לתת-טאב הסטטיסטיקה הפעיל
        let currentStatsType = 'topscorers';

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const leagueName = urlParams.get('name');
            currentLeagueId = urlParams.get('id');
            
            // עדכון כותרת הליגה
            const titleEl = document.getElementById('dynamic-league-title');
            if(leagueName) {
                const words = leagueName.split(' ');
                if(words.length > 1) {
                    const lastWord = words.pop();
                    titleEl.innerHTML = `${words.join(' ')} <span>${lastWord}</span>`;
                } else {
                    titleEl.innerHTML = `<span>${leagueName}</span>`;
                }
            }

            // חיבור אירועים לכפתורי הניווט הראשיים
            const tabBtns = document.querySelectorAll('.league-tab-btn');
            tabBtns.forEach((btn, index) => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    if(index === 0) {
                        loadStandings();
                    } else if(index === 1) {
                        initRoundManager();
                    } else if(index === 2) {
                        loadPlayerStats(currentStatsType);
                    }
                });
            });

            // טעינה ראשונית - פותח אוטומטית את טבלת הליגה לבקשתך
            if(currentLeagueId) {
                loadStandings();
            } else {
                document.getElementById('league-main-display').innerHTML = '<div class="loader">שגיאה: קוד ליגה חסר.</div>';
            }
        });

        // =====================================================================
        // 1. מנגנון טבלת הליגה (Standings)
        // =====================================================================
        async function loadStandings() {
            const container = document.getElementById('league-main-display');
            container.innerHTML = '<div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> טוען את טבלת הליגה...</div>';
            
            try {
                const res = await fetch(`${BASE_URL}/standings?league=${currentLeagueId}&season=${currentSeason}`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const data = await res.json();
                
                if(!data.response || data.response.length === 0) {
                    container.innerHTML = '<div class="loader">אין נתוני טבלה זמינים כרגע.</div>';
                    return;
                }

                const standings = data.response[0].league.standings[0];
                let html = `
                    <table class="api-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th style="text-align:right; padding-right:20px;">קבוצה</th>
                                <th>משחקים</th>
                                <th>נצחונות</th>
                                <th>תיקו</th>
                                <th>הפסדים</th>
                                <th>שערים</th>
                                <th>נקודות</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                standings.forEach(team => {
                    html += `
                        <tr>
                            <td>${team.rank}</td>
                            <td>
                                <div class="team-cell">
                                    <img src="${team.team.logo}" class="team-logo">
                                    <span>${team.team.name}</span>
                                </div>
                            </td>
                            <td>${team.all.played}</td>
                            <td>${team.all.win}</td>
                            <td>${team.all.draw}</td>
                            <td>${team.all.lose}</td>
                            <td dir="ltr">${team.all.goals.for}:${team.all.goals.against}</td>
                            <td style="color:var(--brand-gold); font-weight:900; font-size:15px;">${team.points}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="loader">שגיאה בטעינת הנתונים מהשרת.</div>';
            }
        }

        // =====================================================================
        // 2. מנגנון ניהול ודפדוף מחזורים (Fixtures By Round)
        // =====================================================================
        async function initRoundManager() {
            const container = document.getElementById('league-main-display');
            container.innerHTML = '<div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> מכין את לוח המשחקים...</div>';

            try {
                // שלב א': משיכת כל המחזורים הקיימים בליגה הזו
                const roundsRes = await fetch(`${BASE_URL}/fixtures/rounds?league=${currentLeagueId}&season=${currentSeason}`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const roundsData = await roundsRes.json();
                allRounds = roundsData.response || [];

                // שלב ב': משיכת המחזור הנוכחי הפעיל כרגע בליגה
                const currentRes = await fetch(`${BASE_URL}/fixtures/rounds?league=${currentLeagueId}&season=${currentSeason}&current=true`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const currentData = await currentRes.json();
                
                if(currentData.response && currentData.response.length > 0) {
                    selectedRoundName = currentData.response[0];
                    currentRoundIndex = allRounds.indexOf(selectedRoundName);
                } else if(allRounds.length > 0) {
                    currentRoundIndex = 0;
                    selectedRoundName = allRounds[0];
                }

                renderRoundAndFixtures();

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="loader">שגיאה בארגון לוח המשחקים.</div>';
            }
        }

        async function renderRoundAndFixtures() {
            const container = document.getElementById('league-main-display');
            
            // תרגום קל לעברית של המילה "Regular Season" למראה נקי
            let cleanRoundName = selectedRoundName.replace('Regular Season -', 'מחזור');

            let html = `
                <div class="round-switcher-bar">
                    <button class="round-nav-btn" onclick="changeRound(1)" ${currentRoundIndex >= allRounds.length - 1 ? 'disabled' : ''}>מחזור הבא <i class="fa-solid fa-chevron-left"></i></button>
                    <span class="current-round-text">${cleanRoundName}</span>
                    <button class="round-nav-btn" onclick="changeRound(-1)" ${currentRoundIndex <= 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i> מחזור קודם</button>
                </div>
                <div id="fixtures-list-container">
                    <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> טוען משחקים...</div>
                </div>
            `;
            container.innerHTML = html;
            
            // טעינת המשחקים של המחזור שנבחר
            loadFixturesByRound(selectedRoundName);
        }

        function changeRound(direction) {
            currentRoundIndex += direction;
            selectedRoundName = allRounds[currentRoundIndex];
            renderRoundAndFixtures();
        }

        async function loadFixturesByRound(roundName) {
            const listContainer = document.getElementById('fixtures-list-container');
            
            try {
                const res = await fetch(`${BASE_URL}/fixtures?league=${currentLeagueId}&season=${currentSeason}&round=${encodeURIComponent(roundName)}`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const data = await res.json();

                if(!data.response || data.response.length === 0) {
                    listContainer.innerHTML = '<div class="loader">אין משחקים רשומים במחזור זה.</div>';
                    return;
                }

                let html = '';
                data.response.forEach(match => {
                    const dateObj = new Date(match.fixture.date);
                    const dateStr = dateObj.toLocaleDateString('he-IL');
                    const timeStr = dateObj.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    
                    // בדיקת מצב המשחק: אם הוא עוד לא שוחק נציג שעה, אם הוא שוחק או משוחק נציג תוצאה
                    const status = match.fixture.status.short;
                    let scoreDisplay = timeStr;
                    
                    if(['1H','2H','HT','FT','AET','PEN'].includes(status)) {
                        scoreDisplay = `${match.goals.home} - ${match.goals.away}`;
                        if(['1H','2H','HT'].includes(status)) {
                            scoreDisplay += `<br><span style="color:#ff4a4a; font-size:10px; font-weight:bold;">חי: דקה ${match.fixture.status.elapsed}'</span>`;
                        }
                    }

                    html += `
                        <div class="match-row">
                            <div class="match-team home">
                                <span>${match.teams.home.name}</span>
                                <img src="${match.teams.home.logo}" class="team-logo">
                            </div>
                            <div class="match-score">
                                <div>${scoreDisplay}</div>
                                <span class="match-date">${dateStr}</span>
                            </div>
                            <div class="match-team away">
                                <img src="${match.teams.away.logo}" class="team-logo">
                                <span>${match.teams.away.name}</span>
                            </div>
                        </div>
                    `;
                });

                listContainer.innerHTML = html;

            } catch (err) {
                console.error(err);
                listContainer.innerHTML = '<div class="loader">שגיאה בקריאת המשחקים מהשרת.</div>';
            }
        }

        // =====================================================================
        // 3. מנגנון סטטיסטיקות שחקנים (Player Stats)
        // =====================================================================
        async function loadPlayerStats(type) {
            currentStatsType = type;
            const container = document.getElementById('league-main-display');
            
            // הדפסת תפריט תתי-הטאבים לסטטיסטיקות
            let html = `
                <div class="stats-sub-tabs">
                    <button class="stats-sub-btn ${type === 'topscorers' ? 'active' : ''}" onclick="loadPlayerStats('topscorers')"><i class="fa-solid fa-soccer-ball"></i> מלכי השערים</button>
                    <button class="stats-sub-btn ${type === 'topassists' ? 'active' : ''}" onclick="loadPlayerStats('topassists')"><i class="fa-solid fa-handshake"></i> מלכי הבישולים</button>
                    <button class="stats-sub-btn ${type === 'topyellowcards' ? 'active' : ''}" onclick="loadPlayerStats('topyellowcards')"><i class="fa-solid fa-square" style="color:#ffd700;"></i> צהובים</button>
                    <button class="stats-sub-btn ${type === 'topredcards' ? 'active' : ''}" onclick="loadPlayerStats('topredcards')"><i class="fa-solid fa-square" style="color:#ff4a4a;"></i> אדומים</button>
                </div>
                <div id="stats-data-container">
                    <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> אוסף נתוני שחקנים...</div>
                </div>
            `;
            container.innerHTML = html;

            const dataContainer = document.getElementById('stats-data-container');

            try {
                const res = await fetch(`${BASE_URL}/players/${type}?league=${currentLeagueId}&season=${currentSeason}`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const data = await res.json();

                if(!data.response || data.response.length === 0) {
                    dataContainer.innerHTML = '<div class="loader">אין נתונים סטטיסטיים זמינים כרגע.</div>';
                    return;
                }

                // הגדרת כותרת העמודה האחרונה לפי סוג הנתון
                let statHeader = "שערים";
                if(type === 'topassists') statHeader = "בישולים";
                if(type === 'topyellowcards') statHeader = "כרטיסים צהובים";
                if(type === 'topredcards') statHeader = "כרטיסים אדומים";

                let tableHtml = `
                    <table class="api-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th style="text-align:right;">שחקן</th>
                                <th style="text-align:right;">קבוצה</th>
                                <th>${statHeader}</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.response.slice(0, 15).forEach((item, index) => {
                    const player = item.player;
                    const stats = item.statistics[0];
                    
                    // שליפת הערך הנכון להצגה
                    let statValue = stats.goals.total || 0;
                    if(type === 'topassists') statValue = stats.goals.assists || 0;
                    if(type === 'topyellowcards') statValue = stats.cards.yellow || 0;
                    if(type === 'topredcards') statValue = stats.cards.red || 0;

                    tableHtml += `
                        <tr>
                            <td><b>${index + 1}</b></td>
                            <td>
                                <div class="player-cell">
                                    <img src="${player.photo}" class="player-img">
                                    <span>${player.name}</span>
                                </div>
                            </td>
                            <td>
                                <div class="team-cell">
                                    <img src="${stats.team.logo}" class="team-logo">
                                    <span style="font-weight:400; color:var(--text-gray);">${stats.team.name}</span>
                                </div>
                            </td>
                            <td style="color:var(--brand-gold); font-weight:900; font-size:16px;">${statValue}</td>
                        </tr>
                    `;
                });

                tableHtml += `</tbody></table>`;
                dataContainer.innerHTML = tableHtml;

            } catch (err) {
                console.error(err);
                dataContainer.innerHTML = '<div class="loader">שגיאה במשיכת הנתונים הסטטיסטיים.</div>';
            }
        }

        // =====================================================================
        // סקריפטים נלווים לטעינת הדר וטיקר חיצוניים
        // =====================================================================
        fetch('ticker.html').then(res => res.text()).then(data => {
            const t = document.getElementById('ticker-placeholder');
            if(t) t.innerHTML = data;
        }).catch(err => console.error(err));

        fetch('header.html').then(res => res.text()).then(data => {
            const h = document.getElementById('header-placeholder');
            if(h) h.innerHTML = data;
        }).catch(err => console.error(err));
    </script>
</body>
</html>
